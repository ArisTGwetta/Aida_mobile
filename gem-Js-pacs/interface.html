<!DOCTYPE html>
<!-- AIDA REVIEW BLOCK 1: File header - gem-Js-pacs\interface.html -->
<html lang="en">
<!-- AIDA REVIEW BLOCK 2: Head setup - metadata, title, styles, and preloaded runtime assets. -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIDA | Interface</title>
    
<!-- AIDA REVIEW BLOCK 3: Style rules - visual layout and responsive behavior. -->
    <style>
        :root {
            --ega-green: #00ff41;
            --ega-dark: #003b00;
        }

        body {
            background: #000;
            color: var(--ega-green);
            font-family: 'Courier New', monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* The Hologram Stage */
        #hologram-stage {
            flex: 1;
            position: relative;
            background: radial-gradient(circle, var(--ega-dark) 0%, #000 70%);
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 2px solid var(--ega-green);
        }

        #emotion-face {
            width: 250px;
            height: 250px;
            image-rendering: pixelated;
            z-index: 10;
            filter: drop-shadow(0 0 10px var(--ega-green));
        }

        /* The Flicker/Grid Layer (Managed by Chassis Gold) */
        #pixelGrid {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            opacity: 0.15;
        }

        /* The Dialogue Terminal */
        #terminal-output {
            height: 35%;
            padding: 20px;
            background: rgba(0, 20, 0, 0.9);
            overflow-y: auto;
            border-top: 1px solid var(--ega-green);
            font-size: 16px;
            line-height: 1.4;
        }

        /* The Mobile Input Bar */
        #input-area {
            padding: 15px;
            background: #000;
            display: flex;
            gap: 10px;
        }

        #user-input {
            flex: 1;
            background: transparent;
            border: 1px solid var(--ega-green);
            color: var(--ega-green);
            padding: 10px;
            outline: none;
        }

        #send-btn {
            background: var(--ega-green);
            color: #000;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
        }

        .scanline {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(0, 255, 65, 0.1);
            animation: scan 4s linear infinite;
            pointer-events: none;
        }

        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>

<!-- AIDA REVIEW BLOCK 4: Script bridge - loads or runs JavaScript behavior for this screen. -->
    <script src="scripts/010-chassis_gold.js"></script>
</head>
<!-- AIDA REVIEW BLOCK 5: Body shell - visible app surface and runtime mounting point. -->
<body>

    <div class="scanline"></div>

    <div id="hologram-stage">
        <div id="pixelGrid"></div> <img id="emotion-face" src="assets/standby.png" alt="Aida">
    </div>

    <div id="terminal-output">
        <div style="color: white;">> AIDA_ONE CONNECTED.</div>
        <div>Ready for instructions...</div>
    </div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Type to communicate..." autocomplete="off">
        <button id="send-btn" onclick="communicate()">SEND</button>
    </div>

<!-- AIDA REVIEW BLOCK 6: Script bridge - loads or runs JavaScript behavior for this screen. -->
    <script>
        // Simple communication bridge
        function communicate() {
            const input = document.getElementById('user-input');
            const output = document.getElementById('terminal-output');
            
            if (input.value.trim() === "") return;

            // Display user text
            const userLine = document.createElement('div');
            userLine.style.color = "#888";
            userLine.innerText = `YOU: ${input.value}`;
            output.appendChild(userLine);

            // Here is where we call the Python LLM Engine
            // window.py_call_llm(input.value); 

            input.value = "";
            output.scrollTop = output.scrollHeight;
        }

        // Trigger the arrival animation from 010-chassis_gold.js
        window.onload = () => {
            if(window.aida_arrive) window.aida_arrive();
        };
    </script>
</body>
</html>
