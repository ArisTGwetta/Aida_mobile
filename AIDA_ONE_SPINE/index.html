<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AIDA-One Spine</title>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Aida">
  <link rel="apple-touch-icon" href="body/assets/aida_icon.png">
  <link rel="icon" type="image/png" href="body/assets/aida_icon.png">
  <link rel="stylesheet" href="body/awake.css?v=20260618a">
<style>
    /* Absolute system fallback shield to kill startup white flash artifacts */
    html, body, #bios-screen, #aida-interface, #main-engine {
        background: #000000 !important;
        background-color: #000000 !important;
    }
</style>
</head>
  
<body>
  <main id="bios-screen" aria-label="AIDA BIOS boot log">
    <div id="bios-controls" aria-label="AIDA boot controls">
      <button id="wake-aida-btn" type="button">Wake Aida</button>
      <button id="airlock-start-btn" type="button">Begin Airlock</button>
      <button id="drive-connect-btn" type="button">Connect Drive</button>
      <button id="drive-list-btn" type="button">List Drive JSON</button>
      <button id="drive-fetch-btn" type="button">Fetch Drive JSON</button>
      <button id="context-inspect-btn" type="button">Inspect Context</button>
      <button id="session-inspect-btn" type="button">Inspect Session</button>
      <button id="emotion-inspect-btn" type="button">Inspect Emotion</button>
      <button id="while-away-inspect-btn" type="button">Inspect Away</button>
      <button id="shape-inspect-btn" type="button">Inspect Shapes</button>
      <button id="llm-preview-btn" type="button">Build LLM Messages</button>
      <button id="drive-write-preview-btn" type="button">Preview Drive Writes</button>
      <button id="drive-write-dryrun-btn" type="button">Dry-Run Drive Writes</button>
      <button id="drive-write-apply-btn" type="button">Apply Drive Writes</button>
      <button id="boot-preview-btn" type="button">Preview Awake Body</button>
    </div>
    <div id="bios-latest" aria-live="polite">>>> BIOS ready.</div>
    <div id="bios-logs">
      <div class="log-white">>>> INITIALIZING AIDA-ONE SPINE...</div>
      <div class="log-amber">>>> Awake body donor ready. Mind not mounted yet.</div>
    </div>
  </main>

  <section id="airlock" aria-label="AIDA airlock">
    <h1 class="airlock-title">AIDA</h1>
    <div class="airlock-panel">
      <h2>SECURITY CLEARANCE</h2>
      <input type="password" id="scramble-pin" placeholder="---" maxlength="18" readonly>
      <div id="airlock-status">Zeros are decoys. Three meaningful fragments required.</div>
      <div class="keypad">
        <button class="key" type="button">1</button>
        <button class="key" type="button">2</button>
        <button class="key" type="button">3</button>
        <button class="key" type="button">4</button>
        <button class="key" type="button">5</button>
        <button class="key" type="button">6</button>
        <button class="key" type="button">7</button>
        <button class="key" type="button">8</button>
        <button class="key" type="button">9</button>
        <button class="key key-clear" type="button">CLR</button>
        <button class="key" type="button">0</button>
        <button class="key" type="button">OK</button>
      </div>
      <div class="airlock-tools">
        <button
          id="airlock-inspect-btn"
          type="button"
          onclick="window.AIDA_AIRLOCK?.inspectFromAirlock?.() || window.AIDA_AIRLOCK?.inspectRoutes?.() || window.AIDA_CONTEXT_INSPECTOR?.inspect?.()"
        >Inspect</button>
        <button
          id="airlock-bios-btn"
          type="button"
          onclick="document.getElementById('airlock').style.display='none';document.getElementById('bios-screen').style.display='flex';window.AIDA_BIOS?.scrollToLatest?.();window.AIDA_AIRLOCK?.returnToBios?.()"
        >BIOS</button>
      </div>
    </div>
  </section>

  <section id="aida-interface" aria-label="AIDA interface">
    <div id="veil"></div>
    <div class="pixel-grid" id="pixelGrid"></div>
    <div class="spark-layer" id="sparkLayer"></div>

    <div id="main-engine" class="hidden">
      <div id="chat-flow">
        <div class="line AIDA">Body shell online. Waking Aida's Drive memory...</div>
      </div>

      <div id="aida-display">
        <div id="portrait-spacer" aria-hidden="true"></div>

        <div id="portrait-pane">
          <div id="flicker-grid"></div>
          <div id="face-data-slow" class="face-data-grid face-data-slow"></div>
          <div id="face-data-fast" class="face-data-grid face-data-fast"></div>
          <div class="tint-layer debug-green"></div>
          <div class="tint-layer alert-o"></div>
          <img id="aida-portrait" src="body/assets/neutral1.png" alt="Aida portrait">
        </div>

        <div id="data-stack">
          <div id="debug-pane">
            <div id="log-content">Initializing body...</div>
          </div>
          <div id="presentation-pane">
            <div id="realm-tag">NO REALM</div>
            <div id="pres-content">Spine waiting for first transplant.</div>
          </div>
        </div>
      </div>

      <div id="input-dock">
        <div id="tag-buttons">
          <button class="tag-btn" data-index="0" type="button">#</button>
          <button class="tag-btn" data-index="1" type="button">#</button>
          <button class="tag-btn" data-index="2" type="button">#</button>
          <button class="tag-btn" data-index="3" type="button">#</button>
          <button class="tag-btn" data-index="4" type="button">#</button>
          <button class="tag-btn" data-index="5" type="button">#</button>
          <input id="tag-edit" type="text" placeholder="type tag...">
        </div>

        <div id="message-row">
          <button id="glasses-attach-btn" type="button" title="Attach an image or PDF" aria-label="Attach an image or PDF">+</button>
          <input id="glasses-file-in" type="file" accept="image/png,image/jpeg,image/webp,image/gif,application/pdf" hidden>
          <input type="text" id="user-in" placeholder="Talk to Aida...">
        </div>
        <div id="glasses-attachment-status" aria-live="polite"></div>

        <div class="controls">
          <button id="send-btn" type="button">SEND</button>
          <button id="eject-btn" type="button">REALMS</button>
          <button id="bios-return-btn" type="button">BIOS</button>
          <button id="sleep-btn" type="button">SLEEP</button>
        </div>
      </div>
    </div>
  </section>
  <script src="spine/runtime.js?v=20260618a"></script>
  <script src="spine/config.js?v=20260614a"></script>
  <script src="spine/bios_console.js?v=20260606i"></script>
  <script src="body/awake.js?v=20260616a"></script>
  <script src="spine/airlock.js?v=20260606i"></script>
  <script src="spine/project_context.js?v=20260606i"></script>
  <script src="spine/drive_oauth.js?v=20260618a"></script>
  <script src="spine/context_inspector.js?v=20260606i"></script>
  <script src="spine/llm_messages.js?v=20260618a"></script>
  <script src="spine/crash_buffer.js?v=20260607e"></script>
  <script src="spine/session_capture.js?v=20260607d"></script>
  <script src="spine/context_evolution.js?v=20260607d"></script>
  <script src="spine/emotion_engine.js?v=20260607a"></script>
  <script src="spine/while_away.js?v=20260616b"></script>
  <script src="spine/sleep_cycle.js?v=20260618a"></script>
  <script src="spine/librarian.js?v=20260618a"></script>
  <script src="spine/curator.js?v=20260614f"></script>
  <script src="spine/crawler.js?v=20260618a"></script>
  <script src="spine/drive_writeback.js?v=20260614d"></script>
  <script src="spine/glasses.js?v=20260618a"></script>
  <script src="spine/llm_openai.js?v=20260618a"></script>
  <script src="spine/boot_flow.js?v=20260606i"></script>
</body>
</html>
