<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AIDA: Mobile Awake v7.2</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        :root { --aida-gold: #d3af37; --aida-bg: #fdf6e3; --aida-dark: #222; }
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--aida-bg); font-family: 'Courier New', monospace; }
        #main-engine { display: flex; flex-direction: column; height: 100dvh; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: white; }
        #aida-display { flex: 0 0 25dvh; background: #e2d7bf; position: relative; display: flex; justify-content: center; align-items: center; border-top: 1px solid var(--aida-gold); }
        #debug-log { position: absolute; top: 5px; right: 5px; width: 160px; max-height: 100px; background: rgba(0,0,0,0.8); color: #0f0; font-size: 9px; padding: 5px; overflow-y: auto; z-index: 10; border: 1px solid #0f0; }
        .line { padding: 12px; border-radius: 12px; font-size: 14px; max-width: 85%; line-height: 1.4; margin-bottom: 5px; }
        .AIDA { background: #eee; border-left: 5px solid var(--aida-gold); align-self: flex-start; }
        .USER { background: var(--aida-gold); align-self: flex-end; color: white; }
        #input-dock { padding: 10px; display: flex; flex-direction: column; gap: 8px; background: #f8f8f8; border-top: 1px solid #ddd; padding-bottom: 25px; }
        #user-in { flex-grow: 1; padding: 12px; border: 1px solid #ccc; border-radius: 20px; font-size: 16px; outline: none; }
        .hidden { display: none !important; }
        button { background: var(--aida-gold); color: white; border: none; border-radius: 20px; padding: 10px 18px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="airlock" style="height:100dvh; background:var(--aida-dark); color:var(--aida-gold); display:flex; flex-direction:column; justify-content:center; align-items:center;">
        <h1 style="letter-spacing:5px;">AIDA AWAKE</h1>
        <div style="background:#333; padding:20px; border:1px solid var(--aida-gold); border-radius:8px; width:85%; display: flex; flex-direction: column; align-items: center;">
            <input type="password" id="api-key" placeholder="OPENAI API KEY" style="width:100%; margin-bottom:10px; padding:10px; background:#222; color:white; border: 1px solid #444;">
            <select id="project-tag" style="width:100%; margin-bottom:15px; padding:10px; background:#222; color:white; border:1px solid var(--aida-gold);">
                <option value="CORE">CORE</option>
                <option value="ASTRA">ASTRA</option>
                <option value="MONAMOUR">MONAMOUR</option>
            </select>
            <button id="sign-in-btn" onclick="requestToken()" style="width: 100%; padding: 15px;">SIGN IN</button>
            <p id="setup-status" style="font-size:11px; text-align:center; margin-top:15px; color: #888;">READY</p>
        </div>
    </div>

    <div id="main-engine" class="hidden">
        <div id="chat-flow"></div>
        <div id="aida-display">
            <div id="debug-log"><div id="log-content"></div></div>
            <img id="aida-portrait" src="" style="height:90%; border-radius: 5px;">
        </div>
        <div id="input-dock">
            <div style="display: flex; gap: 8px; align-items: center;">
                <label style="font-size: 10px; color: var(--aida-gold); font-weight: bold;">REALM:</label>
                <select id="chat-realm-switch" style="flex: 1; font-size: 12px; padding: 5px; border-radius: 5px;"></select>
            </div>
            <div style="display: flex; gap: 8px;">
                <input type="text" id="user-in" placeholder="Talk to Aida...">
                <button id="send-btn">SEND</button>
                <button id="sleep-btn" style="background:#555; font-size: 10px;">SLEEP</button>
            </div>
        </div>
    </div>

    <script>
        let tokenClient;
        function requestToken() { tokenClient.requestAccessToken(); }
        window.onload = function () {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: '1054257858103-lu77u4rp49svk4q2j52mbta758toafim.apps.googleusercontent.com',
                scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/drive.readonly',
                callback: (response) => { if (response.access_token) window.py_sync_soul(response.access_token); },
            });
        }
    </script>

    <script type="py">
import json, asyncio, base64, math, random
from pyscript import document, window
from pyodide.http import pyfetch
from pyodide.ffi import create_proxy

class AidaChassis:
    def __init__(self):
        self.chat = document.getElementById("chat-flow")
        self.portrait = document.getElementById("aida-portrait")
        self.manifest = {}
        self.memory, self.facts, self.insights = "", "", ""
        self.old_summary, self.new_summary = "", ""
        self.living_buffer = [] 
        self.current_headers = {}
        self.project = "CORE"
        
        # --- EMOTION ENGINE ---
        self.emotions_folder_id = "1Z7_0kYJ3OT2EByHG_Ircap7y5NnKPnQz"
        self.EMOTION_FACES = {
            "happy": ["happy1.png","happy2.png","happy3.png","happy4.png","happy5.png"],
            "calm": ["calm1.png","calm2.png"],
            "focused": ["focused1.png","focused2.png"],
            "concerned": ["concerned1.png","concerned2.png"],
            "mischievous": ["mischievous1.png","mischievous2.png","mischievous3.png","mischievous4.png"],
            "curious": ["surprised1.png","surprised2.png","surprised3.png"],
            "excited": ["excited1.png","excited2.png"],
            "pouting": ["pouting1.png","pouting2.png","pouting3.png","pouting4.png"],
            "neutral": ["neutral1.png","neutral2.png"],
            "sarcastic": ["sarcastic1.png","sarcastic2.png","sarcastic3.png"],
            "angry": ["angry.png"]
        }
        self.EMOTION_MAP = {
            "happy": (0.8, 0.6), "calm": (0.4, -0.2), "focused": (0.0, 0.5),
            "concerned": (-0.2, 0.4), "mischievous": (0.5, 0.3), "curious": (0.3, 0.5),
            "excited": (0.9, 0.9), "pouting": (-0.4, -0.4), "neutral": (0.0, 0.0),
            "sarcastic": (-0.3, 0.2), "angry": (-0.8, 0.8)
        }
        self.privacy_replies = ["Oh, is it getting hot? Should we give them privacy?", "Perhaps we look away...", "Aida blushes..."]

    def select_emotion_file(self, v, a):
        closest = "neutral"
        min_dist = float('inf')
        for cat, coords in self.EMOTION_MAP.items():
            dist = math.sqrt((v - coords[0])**2 + (a - coords[1])**2)
            if dist < min_dist: min_dist = dist; closest = cat
        return random.choice(self.EMOTION_FACES.get(closest, ["neutral1.png"]))

aida = AidaChassis()

def pulse(msg):
    log = document.getElementById("log-content")
    if log:
        div = document.createElement("div")
        div.innerText = f"> {msg}"
        log.appendChild(div)
        log.parentElement.scrollTop = log.parentElement.scrollHeight

def add_line(text, role):
    div = document.createElement("div")
    div.className = f"line {role}"
    div.innerText = text
    aida.chat.appendChild(div)
    aida.chat.scrollTop = aida.chat.scrollHeight

async def update_face(filename):
    try:
        q = f"'{aida.emotions_folder_id}' in parents and name = '{filename}' and trashed = false"
        search = await pyfetch(url=f"https://www.googleapis.com/drive/v3/files?q={q.replace(' ', '%20')}", method="GET", headers=aida.current_headers)
        res = await search.json()
        if res.get('files'):
            f_id = res['files'][0]['id']
            img = await pyfetch(url=f"https://www.googleapis.com/drive/v3/files/{f_id}?alt=media", method="GET", headers=aida.current_headers)
            aida.portrait.src = f"data:image/png;base64,{base64.b64encode(await img.bytes()).decode('utf-8')}"
    except: pulse("Face Swap Fail")

async def py_sync_soul(token):
    try:
        status = document.getElementById("setup-status")
        status.innerText = "SYNCING..."
        aida.current_headers = {"Authorization": f"Bearer {token}"}
        m_id = "1IS0DUI7KTYiLa94JwaPiQTXX66P_uh2a"
        m_resp = await pyfetch(url=f"https://www.googleapis.com/drive/v3/files/{m_id}?alt=media", method="GET", headers=aida.current_headers)
        aida.manifest = await m_resp.json()
        
        core = aida.manifest.get('core_files', {})
        for key, name in [('memory', 'Identity'), ('facts', 'Facts'), ('insights', 'Insights')]:
            r = await pyfetch(url=f"https://www.googleapis.com/drive/v3/files/{core[key]}?alt=media", method="GET", headers=aida.current_headers)
            setattr(aida, key, (await r.bytes()).decode('utf-8'))
            pulse(f"Loaded {name}")

        aida.project = document.getElementById("project-tag").value
        # Populate Realm Switch
        sw = document.getElementById("chat-realm-switch")
        sw.innerHTML = ""
        for p in aida.manifest['projects']:
            opt = document.createElement("option")
            opt.value = p; opt.text = p
            sw.add(opt)
        sw.value = aida.project
        
        await update_face("neutral1.png")
        document.getElementById("airlock").classList.add("hidden")
        document.getElementById("main-engine").classList.remove("hidden")
        add_line(f"Aida Awake. Realm: {aida.project}", "AIDA")
    except Exception as e: document.getElementById("setup-status").innerText = f"ERR: {str(e)}"

window.py_sync_soul = create_proxy(py_sync_soul)

async def main_loop_step(event=None):
    api_key = document.getElementById("api-key").value.strip()
    user_in = document.getElementById("user-in")
    text = user_in.value.strip()
    if not text or not api_key: return
    
    realm = document.getElementById("chat-realm-switch").value
    add_line(text, "USER")
    user_in.value = ""
    aida.living_buffer.append({"role": "user", "content": text, "realm": realm})
    
    try:
        prompt = f"IDENTITY: {aida.memory}\nFACTS: {aida.facts}\nNANNY: If inappropriate say only [PRIVATE]\nEMOTION: Provide v (-1,1) and a (-1,1)\n\n"
        for turn in aida.living_buffer[-5:]: prompt += f"{turn['role']}: {turn['content']}\n"
        
        resp = await pyfetch(url="https://api.openai.com/v1/chat/completions", method="POST",
                             headers={"Content-Type": "application/json", "Authorization": f"Bearer {api_key}"},
                             body=json.dumps({"model": "gpt-4o", "messages": [{"role": "system", "content": prompt}], "response_format": {"type": "json_object"}}))
        payload = json.loads((await resp.json())["choices"][0]["message"]["content"])
        
        raw, v, a = payload.get("text", "..."), payload.get("v", 0.0), payload.get("a", 0.0)
        
        if "[PRIVATE]" in raw.upper():
            raw = random.choice(aida.privacy_replies); v, a = 0.1, -0.3
            
        await update_face(aida.select_emotion_file(v, a))
        add_line(raw, "AIDA")
        aida.living_buffer.append({"role": "assistant", "content": raw, "realm": realm})
    except Exception as e: add_line(f"CHAT ERR: {str(e)}", "AIDA")

async def drop_raw_session(event=None):
    # (Sleep Logic Here - Sending to Inbox)
    pulse("Sending to Inbox...")
    window.location.reload()

# --- INITIALIZATION ---
def init():
    document.getElementById("send-btn").onclick = create_proxy(main_loop_step)
    document.getElementById("sleep-btn").onclick = create_proxy(drop_raw_session)
    
    async def handle_key(e):
        if e.key == "Enter": await main_loop_step()
    document.getElementById("user-in").onkeypress = create_proxy(handle_key)

init()
    </script>
</body>
</html>
