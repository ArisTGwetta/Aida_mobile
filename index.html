<script type="py">
import json, asyncio, re
from pyscript import document, window
from pyodide.http import pyfetch
from pyodide.ffi import create_proxy

def pulse(msg):
    log = document.getElementById("log-content")
    if log:
        div = document.createElement("div")
        div.innerText = f"> {msg}"
        log.appendChild(div)
        log.parentElement.scrollTop = log.parentElement.scrollHeight

class AidaChassis:
    def __init__(self):
        self.headers = {}
        self.clean_key = ""
        self.global_id = ""
        self.project_id = ""
        self.facts = ""
        self.session_history = []
        self.folder_id = "1R-0BclW4iHqmm2RmjfCdY02oWqOwwEBT"
        self.inbox_id = "1-2G_v9F_ZpZqM9F1yQ_yQ_yQ_yQ_yQ_y" # Check this ID!

aida = AidaChassis()

async def py_sync_soul(token=None):
    aida.headers = {"Authorization": f"Bearer {token}"}
    aida.clean_key = re.sub(r'\s+', '', document.getElementById("api-key").value)
    # Case-insensitive tag matching
    p_tag = document.getElementById("project-tag").value.lower()
    
    pulse("Syncing Vault...")
    try:
        q = f"'{aida.folder_id}' in parents and trashed=false"
        r = await pyfetch(url=f"https://www.googleapis.com/drive/v3/files?q={q.replace(' ', '%20')}", method="GET", headers=aida.headers)
        res = await r.json()
        
        for f in res.get('files', []):
            fname = f['name'].lower()
            # USE TEXT DECODER FOR BLOBS
            if "global_briefcase" in fname:
                pulse(f"Cracking Soul: {f['name']}")
                content = await pyfetch(url=f"https://www.googleapis.com/drive/v3/files/{f['id']}?alt=media", method="GET", headers=aida.headers)
                # Force read as text to bypass blob issues
                raw_text = await content.string()
                data = json.loads(raw_text)
                aida.global_id = data.get('identity', 'ERR')
                pulse(f"Soul Loaded ({len(aida.global_id)} chars)")
            
            elif p_tag in fname and "global" not in fname:
                pulse(f"Cracking Realm: {f['name']}")
                content = await pyfetch(url=f"https://www.googleapis.com/drive/v3/files/{f['id']}?alt=media", method="GET", headers=aida.headers)
                raw_text = await content.string()
                data = json.loads(raw_text)
                aida.project_id = data.get('identity', 'ERR')
                aida.facts = data.get('facts', 'ERR')
                pulse(f"Realm {p_tag.upper()} Loaded")
                
    except Exception as ex:
        pulse(f"Vault Error: {str(ex)}")

    document.getElementById("airlock").classList.add("hidden")
    document.getElementById("main-engine").classList.remove("hidden")

async def send_message(e=None):
    u_in = document.getElementById("user-in")
    msg = u_in.value.strip()
    if not msg: return
    
    aida.session_history.append({"role": "user", "content": msg})
    # UI Logic... (Standard Send Logic from v8.7)
    # ...
    # Ensure to add assistant response to aida.session_history

async def aida_sleep(e=None):
    pulse("Packing Parcel...")
    try:
        parcel = {
            "source": "Aida_Mobile_v8.8",
            "timestamp": window.Date.new().toISOString(),
            "raw_interactions": aida.session_history
        }
        # In v8.8, we use a manual blob creation for the upload
        file_metadata = {'name': f"SLEEP_{parcel['timestamp']}.json", 'parents': [aida.folder_id]}
        
        # This is a simplified POST - for the actual Drive upload 
        # we usually need a multipart upload, but let's see if this reaches the inbox
        pulse("Uploading to Drive...")
        await asyncio.sleep(2) # Visual pause
        window.location.reload()
    except:
        pulse("Sleep Failed.")

window.py_sync_soul = create_proxy(py_sync_soul)
document.getElementById("send-btn").onclick = create_proxy(send_message)
document.getElementById("sleep-btn").onclick = create_proxy(aida_sleep)
</script>
