<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Aida Free v9.7.1</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        :root { --aida-gold: #d3af37; --aida-bg: #fdf6e3; --aida-dark: #222; }
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--aida-bg); font-family: 'Courier New', monospace; }
        
        #main-engine { display: flex; flex-direction: column; height: 100dvh; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: white; }
        
        /* THE TRIPTYCH DISPLAY - Center Mass */
        #aida-display { 
            flex: 0 0 28dvh; 
            background: #000; 
            display: grid;
            grid-template-columns: 1fr 1.8fr 1fr;
            border-top: 2px solid var(--aida-gold);
            border-bottom: 2px solid var(--aida-gold);
            position: relative;
            overflow: hidden;
        }

        /* MICRO-RESOLUTION GRID: 200 Columns x 120 Rows */
        #flicker-grid { 
            position: absolute; inset: 0; 
            display: grid; 
            grid-template-columns: repeat(200, 1fr); 
            grid-template-rows: repeat(120, 1fr); 
            z-index: 20; 
            pointer-events: none; 
        }
        .block { border: 0.1px solid rgba(211, 175, 55, 0.005); }
        .spark { background: rgba(211, 175, 55, 0.25); }

        .tint-layer { position: absolute; inset: 0; pointer-events: none; z-index: 5; opacity: 0; transition: opacity 0.4s; }
        .debug-green { background: rgba(0, 255, 60, 0.12); mix-blend-mode: color; }
        .alert-orange { background: rgba(255, 110, 0, 0.25); mix-blend-mode: color; }
        .is-debug .debug-green { opacity: 1; }
        .is-alert .alert-orange { opacity: 1; z-index: 6; }

        #debug-pane { color: #0f0; font-size: 7px; padding: 5px; overflow: hidden; border-right: 1px solid #333; z-index: 10; line-height: 1; }
        #portrait-pane { position: relative; overflow: hidden; z-index: 10; background: #000; }
        #portrait-pane img { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; }
        #presentation-pane { border-left: 1px solid #333; color: var(--aida-gold); font-size: 9px; padding: 8px; z-index: 10; }

        #input-dock { padding: 10px; background: #f8f8f8; border-top: 1px solid #ddd; padding-bottom: 30px; display: flex; flex-direction: column; gap: 8px; }
        #user-in { width: 100%; padding: 12px; border-radius: 20px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        .controls { display: flex; gap: 5px; }
        button { background: var(--aida-gold); color: white; border: none; border-radius: 20px; padding: 10px 12px; font-weight: bold; cursor: pointer; flex: 1; font-size: 11px; }
        
        .line { padding: 10px; border-radius: 12px; font-size: 14px; max-width: 88%; line-height: 1.4; }
        .AIDA { background: #f0f0f0; border-left: 4px solid var(--aida-gold); align-self: flex-start; }
        .USER { background: var(--aida-gold); align-self: flex-end; color: white; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="airlock" style="height:100dvh; background:var(--aida-dark); color:var(--aida-gold); display:flex; flex-direction:column; justify-content:center; align-items:center;">
        <h1 style="letter-spacing:5px;">AIDA 9.7.1</h1>
        <div style="background:#333; padding:20px; border:1px solid var(--aida-gold); border-radius:8px; width:320px;">
            <input type="password" id="api-key" placeholder="OPENAI KEY" style="width:100%; margin-bottom:10px; padding:10px;">
            <select id="project-tag" style="width:100%; margin-bottom:15px; padding:10px; background:#222; color:white; border:1px solid #444;">
                <option value="CORE">CORE</option>
                <option value="ASTRA">ASTRA</option>
                <option value="DEBUG">DEBUG</option>
                <option value="NEW_PROJECT">+ NEW REALM</option>
            </select>
            <button onclick="requestToken()" style="width:100%;">IGNITE ENGINE</button>
            <p id="setup-status" style="font-size:9px; text-align:center; margin-top:10px; color:#888;">MEMORY LINK STABLE</p>
        </div>
    </div>

    <div id="main-engine" class="hidden">
        <div id="chat-flow"></div>
        <div id="aida-display">
            <div id="flicker-grid"></div> 
            <div id="debug-pane"><div id="log-content"></div></div>
            <div id="portrait-pane">
                <div class="tint-layer debug-green"></div>
                <div class="tint-layer alert-orange"></div>
                <img id="aida-portrait" src="assets/neutral1.png">
            </div>
            <div id="presentation-pane"><div id="realm-tag" style="font-weight:bold; margin-bottom:5px;"></div><div id="pres-content">INITIALIZING...</div></div>
        </div>
        <div id="input-dock">
            <input type="text" id="user-in" placeholder="Message Aida...">
            <div class="controls">
                <button id="send-btn">SEND</button>
                <button id="eject-btn" style="background:#666;">REALM</button>
                <button id="sleep-btn" style="background:#444;">SLEEP</button>
            </div>
        </div>
    </div>

    <script>
        let tokenClient;
        // Memory Feature: Keep API key in localStorage
        if(localStorage.getItem("aida_key")) document.getElementById("api-key").value = localStorage.getItem("aida_key");

        function requestToken() {
            localStorage.setItem("aida_key", document.getElementById("api-key").value);
            tokenClient.requestAccessToken();
        }
        window.onload = function () {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: '1054257858103-lu77u4rp49svk4q2j52mbta758toafim.apps.googleusercontent.com',
                scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/drive.readonly',
                callback: (resp) => { if (resp.access_token) window.py_sync_soul(resp.access_token); },
            });
        }
    </script>

    <script type="py">
import json, asyncio, random
from pyscript import document, window
from pyodide.http import pyfetch
from pyodide.ffi import create_proxy

class AidaChassis:
    def __init__(self):
        self.project = "CORE"
        self.new_project_name = None
        self.headers = {}
        self.session_log = []
        self.blocks = []
        self.inbox_id = "1lvGV7MjaMtSJUUnYjQSSe-VwKgGZSWg7"

    def pulse(self, msg):
        log = document.getElementById("log-content")
        div = document.createElement("div"); div.innerText = f"> {msg}"
        log.appendChild(div); log.parentElement.scrollTop = log.parentElement.scrollHeight

aida = AidaChassis()

async def sparker():
    # Sparking 500 blocks for 20% activity on the new high-res grid
    while True:
        active_set = random.sample(aida.blocks, 500)
        for b in active_set: b.classList.add("spark")
        await asyncio.sleep(0.12)
        for b in active_set: b.classList.remove("spark")
        await asyncio.sleep(0.04)

async def py_sync_soul(token):
    # Setup Micro-Grid (24000 blocks for 200x120)
    grid_div = document.getElementById("flicker-grid")
    for _ in range(2400): # We'll start with 2400 to keep performance smooth on mobile
        b = document.createElement("div"); b.className = "block"
        grid_div.appendChild(b); aida.blocks.append(b)
    
    asyncio.create_task(sparker())
    aida.headers = {"Authorization": f"Bearer {token}"}
    aida.project = document.getElementById("project-tag").value
    document.getElementById("realm-tag").innerText = aida.project
    
    if aida.project == "DEBUG": document.getElementById("aida-display").classList.add("is-debug")
    document.getElementById("airlock").classList.add("hidden")
    document.getElementById("main-engine").classList.remove("hidden")
    aida.pulse("Link Established.")

def add_line(text, role):
    div = document.createElement("div"); div.className = f"line {role}"; div.innerText = text
    document.getElementById("chat-flow").appendChild(div)
    document.getElementById("chat-flow").scrollTop = document.getElementById("chat-flow").scrollHeight

async def main_loop_step(event=None):
    box = document.getElementById("user-in")
    text = box.value.strip()
    if not text: return
    box.value = ""
    add_line(text, "USER")
    aida.session_log.append({"role": "user", "content": text, "project": aida.project})
    aida.pulse(f"In: {text[:10]}...")

    # Pivot logic
    if aida.project == "NEW_PROJECT" and not aida.new_project_name:
        aida.new_project_name = text
        document.getElementById("realm-tag").innerText = text
        add_line(f"Aida: '{text}' confirmed. Ledger opening now.", "AIDA")

async def py_sleep(event=None):
    aida.pulse("Packing Parcel...")
    try:
        now = window.Date.new().toISOString().replace(":", "-").split(".")[0]
        final_realm = aida.new_project_name if aida.new_project_name else aida.project
        filename = f"{final_realm}_SLEEP_{now}.json"
        
        metadata = {"name": filename, "parents": [aida.inbox_id]}
        parcel = {"realm_source": final_realm, "interactions": aida.session_log}
        
        boundary = "AidaParcelBoundary"
        body = f"--{boundary}\nContent-Type: application/json; charset=UTF-8\n\n{json.dumps(metadata)}\n"
        body += f"--{boundary}\nContent-Type: application/json\n\n{json.dumps(parcel)}\n--{boundary}--"

        await pyfetch(
            url="https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart",
            method="POST",
            headers={"Authorization": aida.headers["Authorization"], "Content-Type": f"multipart/related; boundary={boundary}"},
            body=body
        )
        window.location.reload()
    except Exception as e:
        aida.pulse(f"GDrive Fail: {e}")

document.getElementById("send-btn").onclick = create_proxy(main_loop_step)
document.getElementById("sleep-btn").onclick = create_proxy(py_sleep)
document.getElementById("eject-btn").onclick = create_proxy(lambda e: window.location.reload())
window.py_sync_soul = create_proxy(py_sync_soul)
    </script>
</body>
</html>
