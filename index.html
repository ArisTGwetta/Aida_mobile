<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
    <title>Aida Mobile: Astra Sync</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        :root { --aida-gold: #d3af37; --aida-bg: #fdf6e3; --aida-dark: #222; }
        
        html, body { 
            margin: 0; padding: 0; height: 100%; width: 100vw;
            overflow: hidden; background: var(--aida-bg);
            font-family: 'Courier New', Courier, monospace;
            position: fixed; 
        }

        #main-engine { 
            display: flex; flex-direction: column; 
            height: 100dvh; width: 100vw; 
        }

        /* 1. CONSTRICTED DISPLAY: Forces the UI to always be in 'Keyboard Mode' */
        #aida-display { 
            flex: 0 0 20dvh; /* Locked at 20% height, keyboard or no keyboard */
            min-height: 100px;
            background: #e2d7bf; 
            display: flex; justify-content: center; align-items: center; 
            border-bottom: 2px solid var(--aida-gold);
            overflow: hidden;
        }

        #aida-portrait { height: 90%; width: auto; object-fit: contain; }

        #chat-flow { 
            flex: 1 1 auto; 
            overflow-y: auto; padding: 15px; 
            display: flex; flex-direction: column; gap: 10px; 
            background: white; -webkit-overflow-scrolling: touch; 
        }

        .line { padding: 12px; border-radius: 12px; font-size: 14px; max-width: 85%; word-wrap: break-word; }
        .AIDA { background: #f0f0f0; align-self: flex-start; border-left: 5px solid var(--aida-gold); color: #333; }
        .USER { background: var(--aida-gold); align-self: flex-end; color: white; }

        /* 2. THE DOCK: Pinned to the top of the 'Phantom' space */
        #input-dock { 
            flex: 0 0 auto;
            padding: 10px; background: #f8f8f8; display: flex; gap: 10px; 
            border-top: 1px solid #ddd;
        }

        /* 3. THE PHANTOM SPACER: Reserves space for the keyboard */
        #keyboard-phantom {
            height: 35dvh; /* Approximate keyboard height */
            background: #eee;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aaa;
            font-size: 10px;
            text-transform: uppercase;
        }

        /* Hide phantom when the real keyboard pushes the view up */
        @media (visual-viewport-height < 500px) {
            #keyboard-phantom { display: none; }
        }

        #user-in { flex-grow: 1; padding: 12px; border: 1px solid #ccc; border-radius: 20px; font-size: 16px; outline: none; }
        .hidden { display: none !important; }
        button { background: var(--aida-gold); color: white; border: none; border-radius: 20px; padding: 0 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="airlock" style="height:100dvh; background:var(--aida-dark); color:var(--aida-gold); display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:100;">
        <h1>AIDA ONLINE</h1>
        <div style="background:#333; padding:20px; border:1px solid var(--aida-gold); border-radius:8px; width:85%;">
            <input type="password" id="api-key" placeholder="PASTE OPENAI KEY" style="width:100%; margin-bottom:10px; padding:10px; background:#222; color:white;">
            <input type="file" id="soul-file" py-change="sync_soul" style="width:100%; padding:10px; background:#222; color:white;">
            <p id="setup-status" style="margin-top:10px; font-size:12px;">READY TO SYNC</p>
        </div>
    </div>

    <div id="main-engine" class="hidden">
        <div id="aida-display"><img id="aida-portrait" src=""></div>
        <div id="chat-flow"></div>
        <div id="input-dock">
            <input type="text" id="user-in" placeholder="Talk to Aida...">
            <button id="send-btn" py-click="main_loop_step">SEND</button>
        </div>
        <div id="keyboard-phantom">Keyboard Reserve Space</div>
    </div>

    <script type="py">
import json, asyncio, base64
from pyscript import document, window
from pyodide.http import pyfetch

class AidaChassis:
    def __init__(self):
        self.chat = document.getElementById("chat-flow")
        self.portrait = document.getElementById("aida-portrait")
        self.facts = ""
        self.journal = ""
        self.token = ""

aida = AidaChassis()

def add_line(text, tag):
    div = document.createElement("div")
    div.className = f"line {tag}"
    div.innerText = text
    aida.chat.appendChild(div)
    div.scrollIntoView()

async def sync_soul(event):
    try:
        document.getElementById("setup-status").innerText = "SYNCING..."
        file = event.target.files.item(0)
        token_data = json.loads(await file.text())
        aida.token = str(token_data.get('token') or token_data.get('access_token')).strip()
        headers = {"Authorization": f"Bearer {aida.token}"}

        # PORTRAIT
        img_id = "1Q92emgYss0CdGVwe9kcUj_xubsEh2gj7"
        img_resp = await pyfetch(url=f"https://www.googleapis.com/drive/v3/files/{img_id}?alt=media", method="GET", headers=headers)
        aida.portrait.src = f"data:image/png;base64,{base64.b64encode(await img_resp.bytes()).decode('utf-8')}"

        # DATA
        q = "name = 'facts.json' or name = 'latest_journal.json'"
        list_resp = await pyfetch(url=f"https://www.googleapis.com/drive/v3/files?q={q.replace(' ', '%20')}", method="GET", headers=headers)
        files = (await list_resp.json()).get('files', [])

        for f in files:
            f_resp = await pyfetch(url=f"https://www.googleapis.com/drive/v3/files/{f['id']}?alt=media", method="GET", headers=headers)
            text = (await f_resp.bytes()).decode('utf-8')
            if f['name'] == 'facts.json': aida.facts = text
            else: aida.journal = text

        document.getElementById("airlock").classList.add("hidden")
        document.getElementById("main-engine").classList.remove("hidden")
        
    except Exception as e:
        document.getElementById("setup-status").innerText = f"CRASH: {str(e)[:20]}"

async def main_loop_step(event):
    api_key = document.getElementById("api-key").value.strip()
    user_in = document.getElementById("user-in")
    user_text = user_in.value.strip()
    
    if not api_key:
        add_line("SYSTEM: Missing Key.", "AIDA")
        return
    if not user_text: return

    add_line(user_text, "USER")
    user_in.value = ""

    sys_prompt = f"IDENTITY: You are AIDA. You know Francisco. Past is here: MEMORY: {aida.facts} JOURNAL: {aida.journal}. JSON ONLY: {{'text': '...'}}"
    
    try:
        resp = await pyfetch(
            url="https://api.openai.com/v1/chat/completions",
            method="POST",
            headers={"Content-Type": "application/json", "Authorization": f"Bearer {api_key}"},
            body=json.dumps({
                "model": "gpt-4o",
                "messages": [{"role": "system", "content": sys_prompt}, {"role": "user", "content": user_text}],
                "response_format": {"type": "json_object"}
            })
        )
        
        res_data = await resp.json()
        if "choices" in res_data:
            content = json.loads(res_data["choices"][0]["message"]["content"])
            add_line(content["text"], "AIDA")
        else:
            add_line("Brain Error: Check API.", "AIDA")
        
    except Exception as e:
        add_line(f"System Error: {str(e)[:40]}", "AIDA")
    </script>
</body>
</html>
