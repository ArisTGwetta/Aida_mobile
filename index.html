<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Aida v9.8.5</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        :root { --aida-gold: #d3af37; --aida-dark: #222; }
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--aida-dark); font-family: 'Courier New', monospace; }
        
        /* AIRLOCK */
        #airlock { height: 100dvh; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--aida-gold); }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .key { background: #333; border: 1px solid var(--aida-gold); color: var(--aida-gold); padding: 15px; border-radius: 10px; font-size: 18px; font-weight: bold; }
        
        /* ENGINE */
        #main-engine { display: flex; flex-direction: column; height: 100dvh; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: white; border-bottom: 2px solid var(--aida-gold); }
        #aida-display { flex: 0 0 35dvh; background: #000; display: grid; grid-template-columns: 1fr 1.8fr 1fr; position: relative; overflow: hidden; }
        #flicker-grid { position: absolute; inset: 0; display: grid; grid-template-columns: repeat(60, 1fr); grid-template-rows: repeat(40, 1fr); z-index: 30; pointer-events: none; }
        .spark-blue { background: #00d4ff; box-shadow: 0 0 12px #00b4ff, 0 0 20px rgba(0, 180, 255, 0.8); }
        .spark-white { background: #fff; box-shadow: 0 0 15px #fff, 0 0 25px rgba(255, 255, 255, 0.9); }

        #debug-pane { color: #0f0; font-size: 8px; padding: 8px; border-right: 1px solid #333; z-index: 10; background: rgba(0,0,0,0.8); overflow-y: auto; }
        #portrait-pane { position: relative; z-index: 10; background: #000; display: flex; align-items: center; justify-content: center; }
        #aida-portrait { height: 100%; width: 100%; object-fit: cover; }
        #presentation-pane { border-left: 1px solid #333; color: var(--aida-gold); font-size: 10px; padding: 10px; z-index: 10; background: rgba(0,0,0,0.8); text-align: right; }

        #input-dock { padding: 15px; background: #eee; padding-bottom: 35px; display: flex; flex-direction: column; gap: 10px; }
        #user-in { width: 100%; padding: 16px; border-radius: 25px; border: 1px solid #bbb; font-size: 16px; }
        .line { padding: 12px; border-radius: 15px; font-size: 15px; max-width: 85%; }
        .AIDA { background: #f9f9f9; border-left: 5px solid var(--aida-gold); align-self: flex-start; }
        .USER { background: var(--aida-gold); align-self: flex-end; color: white; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="airlock">
        <div style="background:#333; padding:20px; border:1px solid var(--aida-gold); border-radius:15px; width:300px;">
            <input type="password" id="scramble-pin" placeholder="---" maxlength="3" readonly style="width:100%; margin-bottom:15px; padding:12px; text-align:center; letter-spacing:15px; font-size: 24px; background: #000; color: var(--aida-gold); border: 1px solid #444;">
            <div class="keypad">
                <button class="key" onclick="pressKey('1')">1</button><button class="key" onclick="pressKey('2')">2</button><button class="key" onclick="pressKey('3')">3</button>
                <button class="key" onclick="pressKey('4')">4</button><button class="key" onclick="pressKey('5')">5</button><button class="key" onclick="pressKey('6')">6</button>
                <button class="key" onclick="pressKey('7')">7</button><button class="key" onclick="pressKey('8')">8</button><button class="key" onclick="pressKey('9')">9</button>
                <button class="key" style="color:#666" onclick="pressKey('0')">0</button><button class="key" style="color:#ff4444" onclick="pressKey('C')">CLR</button><button class="key" onclick="requestToken()">OK</button>
            </div>
            <select id="project-tag" onchange="checkNewProject(this.value)" style="width:100%; margin-top:20px; padding:12px; background:#111; color:white; border: 1px solid #444;">
                <option value="CORE">CORE</option><option value="ASTRA">ASTRA</option><option value="DEBUG">DEBUG</option><option value="NEW">+ NEW REALM</option>
            </select>
        </div>
    </div>

    <div id="main-engine" class="hidden">
        <div id="chat-flow"></div>
        <div id="aida-display">
            <div id="flicker-grid"></div> 
            <div id="debug-pane"><div id="log-content">Initializing...</div></div>
            <div id="portrait-pane"><img id="aida-portrait" src=""></div>
            <div id="presentation-pane"><div id="realm-tag" style="font-weight:bold; font-size:12px; margin-bottom:8px;"></div><div id="pres-content">Engine Stitched.</div></div>
        </div>
        <div id="input-dock">
            <input type="text" id="user-in" placeholder="Speak to Aida...">
            <div style="display:flex; gap:8px;">
                <button id="send-btn" style="background:var(--aida-gold); color:white; border:none; border-radius:20px; padding:12px; font-weight:bold; flex:1;">SEND</button>
                <button id="sleep-btn" style="background:#444; color:white; border:none; border-radius:20px; padding:12px; font-weight:bold; flex:1;">SLEEP</button>
            </div>
        </div>
    </div>

    <script>
        let tokenClient;
        function pressKey(val) {
            const box = document.getElementById("scramble-pin");
            if (val === 'C') box.value = ""; else if (box.value.length < 3) box.value += val;
        }
        function checkNewProject(val) {
            if(val === "NEW") {
                const name = prompt("New Realm Name:");
                if(name) {
                    const opt = document.createElement("option");
                    opt.value = name.toUpperCase(); opt.text = name.toUpperCase();
                    const sel = document.getElementById("project-tag");
                    sel.add(opt, sel.options.length-1); sel.value = opt.value;
                } else { document.getElementById("project-tag").value = "CORE"; }
            }
        }
        function requestToken() {
            if(document.getElementById("scramble-pin").value.length === 3) tokenClient.requestAccessToken();
            else alert("ACCESS DENIED");
        }
        window.onload = () => {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: '1054257858103-lu77u4rp49svk4q2j52mbta758toafim.apps.googleusercontent.com',
                scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/drive.readonly',
                callback: (resp) => { if (resp.access_token) window.py_sync_soul(resp.access_token); },
            });
        }
    </script>

    <script type="py">
import json, asyncio, random
from pyscript import document, window
from pyodide.http import pyfetch
from pyodide.ffi import create_proxy

def pulse(msg):
    log = document.getElementById("log-content")
    if log:
        div = document.createElement("div"); div.innerText = f"> {msg}"; log.appendChild(div)
        log.parentElement.scrollTop = log.parentElement.scrollHeight

class AidaChassis:
    def __init__(self):
        self.headers = {}
        self.blocks = []
        self.project = "CORE"
        self.vault_id = "1DelETbXYT8egWrB9oN4Dbe_wyrliOm66"

aida = AidaChassis()

async def sparker():
    while True:
        if aida.blocks:
            active = random.sample(aida.blocks, 80)
            for b in active: b.classList.add("spark-blue" if random.random() > 0.3 else "spark-white")
            await asyncio.sleep(0.1)
            for b in active: b.classList.remove("spark-blue", "spark-white")
        await asyncio.sleep(0.05)

async def py_sync_soul(token):
    aida.headers = {"Authorization": f"Bearer {token}"}
    aida.project = document.getElementById("project-tag").value
    document.getElementById("realm-tag").innerText = aida.project
    
    # Grid Setup
    grid_div = document.getElementById("flicker-grid")
    for _ in range(2400):
        b = document.createElement("div"); b.className = "block"
        grid_div.appendChild(b); aida.blocks.append(b)
    asyncio.create_task(sparker())

    # ACTUAL DRIVE FETCH
    pulse(f"Connecting to Vault: {aida.vault_id}...")
    try:
        resp = await pyfetch(url=f"https://www.googleapis.com/drive/v3/files?q='{aida.vault_id}'+in+parents", method="GET", headers=aida.headers)
        data = await resp.json()
        pulse(f"Briefcases Found: {len(data.get('files', []))}")
    except:
        pulse("Drive Connection Failed.")

    document.getElementById("aida-portrait").src = "neutral1.png"
    document.getElementById("airlock").classList.add("hidden")
    document.getElementById("main-engine").classList.remove("hidden")

async def send_message(e=None):
    u_in = document.getElementById("user-in"); msg = u_in.value.strip()
    if msg:
        add_line(msg, "USER"); u_in.value = ""; pulse("Logic Sent...")
        # Aida response logic would go here
        add_line("Logic processed. Briefcases synced.", "AIDA")

def add_line(text, role):
    flow = document.getElementById("chat-flow")
    div = document.createElement("div"); div.className = f"line {role}"; div.innerText = text
    flow.appendChild(div); flow.scrollTop = flow.scrollHeight

document.getElementById("send-btn").onclick = create_proxy(send_message)
document.getElementById("sleep-btn").onclick = create_proxy(lambda e: window.location.reload())
window.py_sync_soul = create_proxy(py_sync_soul)
    </script>
</body>
</html>
