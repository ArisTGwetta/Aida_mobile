<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Aida Mobile V5.7</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        :root { --aida-gold: #d3af37; --aida-bg: #fdf6e3; --aida-dark: #222; }
        body { margin: 0; background: var(--aida-bg); display: flex; flex-direction: column; height: 100vh; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        #airlock { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: var(--aida-dark); color: var(--aida-gold); padding: 20px; text-align: center; z-index: 100; position: absolute; width: 100%; top: 0; }
        .setup-box { background: #333; padding: 20px; border: 1px solid var(--aida-gold); border-radius: 8px; width: 90%; max-width: 400px; box-sizing: border-box; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid var(--aida-gold); color: white; border-radius: 4px; font-size: 16px; box-sizing: border-box; }
        .hidden { display: none !important; }
        #main-engine { flex: 1; display: flex; flex-direction: column; padding: 10px; height: 100vh; box-sizing: border-box; }
        #monitor { height: 120px; background: #000; color: #0f0; padding: 10px; font-size: 0.7rem; overflow-y: auto; margin-bottom: 10px; border-radius: 5px; border: 1px solid #333; line-height: 1.2; word-break: break-all; }
        #display { height: 240px; background: #eee; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--aida-gold); overflow: hidden; }
        #aida-portrait { max-height: 100%; width: auto; }
        #user-in { width: 100%; padding: 15px; border: 1px solid #ccc; border-radius: 25px; margin-bottom: 10px; box-sizing: border-box; font-size: 16px; }
    </style>
</head>
<body>

    <div id="airlock">
        <div class="setup-box">
            <h2>AIDA V5.7</h2>
            <input type="password" id="openai-key" placeholder="OpenAI Key">
            <input type="password" id="google-key" placeholder="Google API Key">
            <p style="font-size: 0.7rem; color: #888;">Upload Soul JSON</p>
            <input type="file" id="soul-upload" accept=".json">
        </div>
    </div>

    <div id="main-engine" class="hidden">
        <div id="display"><img id="aida-portrait" src="" alt="[ AIDA PORTRAIT ]"></div>
        <div id="monitor">SYSTEM: Ready...</div>
        <input type="text" id="user-in" placeholder="Message Aida...">
        <button id="send-btn" py-click="main_loop_step" style="width:100%; padding:15px; background:var(--aida-gold); color:white; border:none; border-radius:10px; font-weight:bold;">SEND</button>
    </div>

    <script type="py">
from pyscript import document, window
from pyodide.http import pyfetch
import json

class AidaChassis:
    def __init__(self):
        self.token = ""
        self.facts = "Memory Bank Empty."

    def log(self, text):
        mon = document.getElementById("monitor")
        mon.innerHTML += f"<br>> {text}"
        mon.scrollTop = mon.scrollHeight

aida = AidaChassis()

async def sync_soul(event):
    file_list = event.target.files
    if not file_list: return
    
    file = file_list.item(0)
    content = await file.text()
    
    document.getElementById("airlock").classList.add("hidden")
    document.getElementById("main-engine").classList.remove("hidden")
    
    try:
        # CLEANING DATA (Crucial fix from yesterday)
        token_raw = json.loads(content)
        aida.token = str(token_raw.get('token') or token_raw.get('access_token')).strip().replace("\n", "").replace("\r", "")
        g_key = document.getElementById("google-key").value.strip()
        
        aida.log("Soul Verified. Targeting Files...")
        headers = {"Authorization": f"Bearer {aida.token}"}

        # Targeted Query - Looking only for your specific files
        # We URL encode the query string ourselves to be safe
        q_str = "name='facts.json'+or+name='hello-goobye.png'"
        url = f"https://www.googleapis.com/drive/v3/files?q={q_str}&key={g_key}"
        
        resp = await pyfetch(url=url, method="GET", headers=headers)
        
        if resp.status == 200:
            data = await resp.json()
            files = data.get('files', [])
            aida.log(f"Locked on {len(files)} files.")
            
            for f in files:
                fid = f['id']
                fname = f['name']
                media_url = f"https://www.googleapis.com/drive/v3/files/{fid}?alt=media&key={g_key}"
                
                # Fetch as Blob for everything (the 'Fix' from last night)
                m_resp = await pyfetch(url=media_url, method="GET", headers=headers)
                blob_bytes = await m_resp.bytes()
                
                if fname == 'facts.json':
                    js_bytes = window.Uint8Array.new(blob_bytes)
                    text_blob = window.Blob.new([js_bytes], {type: "text/plain"})
                    aida.facts = await text_blob.text()
                    aida.log("Facts synced via Blob.")
                
                elif fname == 'hello-goobye.png':
                    img_bytes = window.Uint8Array.new(blob_bytes)
                    img_blob = window.Blob.new([img_bytes], {type: "image/png"})
                    document.getElementById("aida-portrait").src = window.URL.createObjectURL(img_blob)
                    aida.log("Portrait Rendered.")
        else:
            err = await resp.text()
            aida.log(f"TARGET ERROR {resp.status}: {err[:100]}")

    except Exception as e:
        aida.log(f"CRITICAL: {str(e)}")

async def main_loop_step(event):
    aida.log("Cognition cycle initiated.")
    </script>
</body>
</html>
