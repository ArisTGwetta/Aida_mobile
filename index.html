<!DOCTYPE html>
<html>
<head>
    <title>AIDA-ONE | Consciousness Concentration</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
    
    <script src="011-butler_keys.js"></script> 
    <script src="001-buttler_amber.js"></script>
    <script src="002-librarian_green.js"></script>
    <script src="008-crawler_green.js"></script>
    <script src="003-emotion_blue.js"></script>
    <script src="004-identity_white.js"></script>
    <script src="005-realm_silver.js"></script>
    <script src="006-role_silver.js"></script>
    <script src="009-tetrad_silver.js"></script>
    <script src="007-soul_sync_blue.js"></script>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; margin: 20px; }
        #bios-terminal { border: 1px solid #333; padding: 20px; height: 70vh; overflow-y: auto; background: #050505; }
        .log-amber { color: #ffb000; }
        .log-green { color: #00ff41; }
        .log-blue { color: #00d4ff; }
        .log-error { color: #ff4444; font-weight: bold; }
        .hidden { display: none; }
        button { background: transparent; border: 1px solid #00ff41; color: #00ff41; padding: 10px 20px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="bios-terminal">
        <div>> AIDA SYSTEM BOOT SEQUENCE INITIATED...</div>
    </div>

    <button id="keypad-airlock" class="hidden" onclick="alert('Engine Warm! Moving to Interface...')">
        ENTER CONSCIOUSNESS
    </button>

    <script>
        const systemLog = document.getElementById("bios-terminal");

        function logToScreen(message, phase = "green") {
            const line = document.createElement("div");
            line.className = `log-${phase}`;
            line.innerText = `> [${phase.toUpperCase()}] ${message}`;
            systemLog.appendChild(line);
            systemLog.scrollTop = systemLog.scrollHeight;
        }

        async function main() {
            logToScreen("Waking up Pyodide...", "amber");
            // 1. Load the core engine
            window.pyodide = await loadPyodide(); 
            
            logToScreen("Engine warm. Building Virtual Cupboards...", "amber");

            const aidaManifest = [
                { name: "butler.py",           content: BUTLER_PY,           phase: "amber" },
                { name: "librarian.py",        content: LIBRARIAN_PY,        phase: "green" },
                { name: "crawler.py",          content: CRAWLER_PY,          phase: "green" },
                { name: "emotion_selector.py", content: EMOTION_SELECTOR_PY, phase: "blue" },
                { name: "identity_organ.py",   content: IDENTITY_PY,         phase: "white" },
                { name: "realm_organ.py",      content: REALM_PY,            phase: "silver" },
                { name: "role_organ.py",       content: ROLE_PY,             phase: "silver" },
                { name: "tetrad_chassis.py",   content: TETRAD_PY,           phase: "silver" },
                { name: "soul_sync_engine.py", content: SOUL_SYNC_PY,        phase: "blue" }
            ];

            for (let mod of aidaManifest) {
                try {
                    logToScreen(`Unpacking ${mod.name}...`, mod.phase);
                    
                    // CRITICAL FIX: Use pyodide.FS (Capitalized)
                    // This creates the physical-feeling file inside the browser's brain
                    await pyodide.FS.writeFile(mod.name, mod.content);
                    
                    logToScreen(`${mod.name} is ready.`, mod.phase);
                } catch (e) {
                    logToScreen(`CRITICAL ERROR UNPACKING ${mod.name}: ${e.message}`, "error");
                }
            }

            logToScreen("All modules synchronized. Aida is concentrated.", "blue");
            document.getElementById("keypad-airlock").classList.remove("hidden");
        }

        main();
    </script>
</body>
</html>
