<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Aida Mobile V5.1</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        :root { --aida-gold: #d3af37; --aida-bg: #fdf6e3; --aida-dark: #222; }
        body { margin: 0; background: var(--aida-bg); display: flex; flex-direction: column; height: 100vh; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        #airlock { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: var(--aida-dark); color: var(--aida-gold); padding: 30px; text-align: center; }
        .setup-box { background: #333; padding: 20px; border: 1px solid var(--aida-gold); border-radius: 8px; width: 90%; max-width: 400px; }
        .setup-input { width: 100%; background: #222; color: white; border: 1px solid #444; padding: 10px; margin-bottom: 10px; border-radius: 4px; }
        #main-engine { display: flex; flex-direction: column; height: 100vh; }
        .hidden { display: none !important; }
        #aida-display { height: 35vh; background: #e2d7bf; display: flex; justify-content: center; align-items: center; }
        #aida-portrait { height: 90%; transition: opacity 0.3s; }
        #memory-monitor { height: 60px; background: #111; color: #0f0; font-family: monospace; font-size: 10px; padding: 10px; overflow-y: auto; border-top: 2px solid var(--aida-gold); }
        #chat-flow { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: white; }
        .line { padding: 10px; border-radius: 8px; font-size: 14px; max-width: 85%; }
        .AIDA { background: #f0f0f0; align-self: flex-start; border-left: 5px solid var(--aida-gold); }
        .USER { background: var(--aida-gold); align-self: flex-end; color: white; }
        #input-dock { padding: 15px; background: #f8f8f8; display: flex; gap: 10px; border-top: 1px solid #ddd; padding-bottom: env(safe-area-inset-bottom); }
        #user-in { flex-grow: 1; padding: 12px; border: 1px solid #ccc; border-radius: 20px; }
    </style>
</head>
<body>
    <div id="airlock">
        <h1>AIDA ONLINE</h1>
        <div class="setup-box">
            <input type="password" id="api-key" class="setup-input" placeholder="OPENAI API KEY">
            <input type="file" id="soul-file" class="setup-input">
            <div id="setup-status">READY...</div>
        </div>
    </div>

    <div id="main-engine" class="hidden">
        <div id="aida-display"><img id="aida-portrait" src="" alt="Aida"></div>
        <div id="memory-monitor">SYSTEM: Awaiting Drive Data...</div>
        <div id="chat-flow"></div>
        <div id="input-dock">
            <input type="text" id="user-in" placeholder="Speak to Aida...">
            <button id="send-btn" py-click="main_loop_step" style="background:var(--aida-gold); color:white; border:none; border-radius:20px; padding:0 15px;">SEND</button>
        </div>
    </div>

    <script type="py">
import json, asyncio
from pyscript import document, window
from pyodide.http import pyfetch

class AidaChassis:
    def __init__(self):
        self.chat = document.getElementById("chat-flow")
        self.portrait = document.getElementById("aida-portrait")
        self.monitor = document.getElementById("memory-monitor")
        self.facts = "No Facts Loaded."
        self.journal = "No History Loaded."
        self.token = ""

    def log(self, text):
        self.monitor.innerText = f"SYSTEM: {text}"

    def display_text(self, text, tag="AIDA"):
        div = document.createElement("div")
        div.className = f"line {tag}"
        div.innerText = f"[{tag}] {text}"
        self.chat.appendChild(div)
        div.scrollIntoView()

aida = AidaChassis()

async def sync_soul(event):
    file = event.target.files.item(0)
    if not file: return
    content = await file.text()
    try:
        token_data = json.loads(content)
        aida.token = str(token_data.get('token') or token_data.get('access_token')).strip()
        headers = {"Authorization": f"Bearer {aida.token}"}

        aida.log("Connecting to Drive...")
        resp = await pyfetch(url="https://www.googleapis.com/drive/v3/files?q=trashed=false&orderBy=nameDesc", method="GET", headers=headers)
        data = await resp.json()
        
        for f in data.get('files', []):
            fname = f['name']
            fid = f['id']
            if fname == 'facts.json' or 'journal_' in fname or fname == 'hello-goobye.png':
                f_resp = await pyfetch(url=f"https://www.googleapis.com/drive/v3/files/{fid}?alt=media", method="GET", headers=headers)
                
                if fname == 'facts.json':
                    aida.facts = await f_resp.text()
                    aida.log("Facts Loaded.")
                elif 'journal_' in fname and aida.journal == "No History Loaded.":
                    aida.journal = await f_resp.text()
                    aida.log(f"Journal Synced: {fname}")
                elif fname == 'hello-goobye.png':
                    img_bytes = await f_resp.bytes()
                    blob = window.Blob.new([window.Uint8Array.new(img_bytes)], {type: "image/png"})
                    aida.portrait.src = window.URL.createObjectURL(blob)
                    aida.log("Portrait Rendered.")

        document.getElementById("airlock").classList.add("hidden")
        document.getElementById("main-engine").classList.remove("hidden")

    except Exception as e:
        aida.log(f"SYNC ERROR: {str(e)}")

async def main_loop_step(event):
    api_key = document.getElementById("api-key").value.strip()
    user_text = document.getElementById("user-in").value.strip()
    if not user_text: return

    aida.display_text(user_text, "USER")
    document.getElementById("user-in").value = ""

    sys_prompt = f"IDENTITY: You are AIDA. FACTS: {aida.facts} HISTORY: {aida.journal}. Response format: JSON only. {{'emotion': 'happy', 'text': '...'}}"
    
    try:
        resp = await pyfetch(
            url="https://api.openai.com/v1/chat/completions",
            method="POST",
            headers={"Content-Type": "application/json", "Authorization": f"Bearer {api_key}"},
            body=json.dumps({
                "model": "gpt-4o",
                "messages": [{"role": "system", "content": sys_prompt}, {"role": "user", "content": user_text}],
                "response_format": {"type": "json_object"}
            })
        )
        res_data = await resp.json()
        content = json.loads(res_data["choices"][0]["message"]["content"])
        aida.display_text(content["text"], "AIDA")
        aida.log(f"Mood: {content['emotion']}")
    except Exception as e:
        aida.log(f"BRAIN ERROR: {str(e)}")

document.getElementById("soul-file").onchange = sync_soul
    </script>
</body>
</html>
