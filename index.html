<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Aida Free v9.6.4</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        :root { --aida-gold: #d3af37; --aida-bg: #fdf6e3; --aida-dark: #222; }
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--aida-bg); font-family: 'Courier New', monospace; }
        #main-engine { display: flex; flex-direction: column; height: 100dvh; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: white; border-bottom: 2px solid var(--aida-gold); }
        
        /* RESTORED DEBUG LOG & VISUAL STACK */
        #aida-display { flex: 0 0 32dvh; background: #000; display: flex; border-bottom: 2px solid var(--aida-gold); position: relative; overflow: hidden; }
        #debug-log { flex: 0 0 30%; background: #111; color: #0f0; font-size: 9px; padding: 10px; overflow-y: auto; border-right: 1px solid #333; z-index: 5; }
        .visual-container { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background: #050505; border-right: 1px solid #111; overflow: hidden; }
        .visual-container img { height: 100%; width: auto; object-fit: contain; z-index: 1; transition: opacity 0.5s; }
        
        /* 40x60 BLOCK GRID */
        .grid-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: grid; 
                      grid-template-columns: repeat(20, 1fr); grid-template-rows: repeat(30, 1fr); 
                      z-index: 10; pointer-events: none; }
        .block { border: 0.1px solid rgba(211, 175, 55, 0.03); }
        
        @keyframes spark { 0% { background: rgba(255, 255, 255, 0); } 10% { background: rgba(255, 255, 255, 0.15); } 100% { background: rgba(255, 255, 255, 0); } }
        .sparking { animation: spark 0.4s ease-out; }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 15; pointer-events: none; transition: background 1s; }
        .ega-orange { background: rgba(255, 110, 0, 0.5); mix-blend-mode: color; }
        .ega-green { background: rgba(0, 255, 60, 0.5); mix-blend-mode: color; }

        .line { padding: 12px; border-radius: 12px; font-size: 14px; max-width: 85%; position: relative; }
        .tag { position: absolute; top: -8px; right: 10px; font-size: 9px; background: #444; color: #eee; padding: 2px 6px; border-radius: 4px; }
        .AIDA { background: #eee; border-left: 5px solid var(--aida-gold); align-self: flex-start; }
        .USER { background: var(--aida-gold); align-self: flex-end; color: white; }
        
        #input-dock { padding: 12px; background: #f8f8f8; display: flex; flex-direction: column; gap: 8px; padding-bottom: 25px; }
        button { background: var(--aida-gold); color: white; border: none; border-radius: 20px; padding: 10px 18px; font-weight: bold; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="airlock" style="height:100dvh; background:var(--aida-dark); color:var(--aida-gold); display:flex; flex-direction:column; justify-content:center; align-items:center;">
        <h1 style="letter-spacing:5px;">AIDA 9.6.4</h1>
        <div style="background:#333; padding:25px; border:1px solid var(--aida-gold); border-radius:10px; width:350px;">
            <input type="password" id="api-key" placeholder="OPENAI KEY" style="width:100%; padding:10px; margin-bottom:10px; background:#111; color:white; border:1px solid #444;">
            <select id="project-tag" style="width:100%; padding:10px; margin-bottom:15px; background:#111; color:white; border:1px solid var(--aida-gold);">
                <option value="CORE">CORE</option><option value="ASTRA">ASTRA</option><option value="DEBUG">DEBUG</option><option value="NEW">NEW PROJECT</option>
            </select>
            <button onclick="requestToken()" style="width:100%;">IGNITE</button>
        </div>
    </div>

    <div id="main-engine" class="hidden">
        <div id="chat-flow"></div>
        <div id="aida-display">
            <div id="debug-log"><div id="log-content">Wake Sequence...</div></div>
            <div class="visual-container" id="face-container">
                <img id="aida-portrait" src="">
                <div id="tint-layer" class="overlay"></div>
            </div>
            <div class="visual-container" id="pres-container">
                <img id="presentation-asset" src="" style="opacity:0;">
                <div id="pres-tint" class="overlay"></div>
                <div style="position:absolute; bottom:5px; color:#444; font-size:8px; z-index:20;">PRESENTATION_ACTIVE</div>
            </div>
        </div>
        
        <div id="input-dock">
            <div style="display: flex; gap: 8px;">
                <select id="active-tag" style="padding:10px; border-radius:20px; font-size:10px;">
                    <option value="CORE">CORE</option><option value="ASTRA">ASTRA</option><option value="DEBUG">DEBUG</option>
                </select>
                <input type="text" id="user-in" style="width:100%; padding:12px; border-radius:20px; border:1px solid #ccc;" placeholder="Command Aida...">
                <button id="send-btn">SEND</button>
            </div>
            <button id="sleep-btn" style="background:#444; font-size:10px;">PREPARE SLEEP PARCEL</button>
        </div>
    </div>

    <script>
        let tokenClient;
        function requestToken() { tokenClient.requestAccessToken(); }
        window.onload = function () {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: '1054257858103-lu77u4rp49svk4q2j52mbta758toafim.apps.googleusercontent.com',
                scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/drive.readonly',
                callback: (resp) => { if (resp.access_token) window.py_sync_soul(resp.access_token); },
            });
        }
    </script>

    <script type="py">
import json, asyncio, re, math, random
from pyscript import document, window
from pyodide.http import pyfetch
from pyodide.ffi import create_proxy

def pulse(msg):
    log = document.getElementById("log-content")
    if log:
        div = document.createElement("div"); div.innerText = f"> {msg}"; log.appendChild(div)
        log.parentElement.scrollTop = log.parentElement.scrollHeight

class AidaChassis:
    def __init__(self):
        self.headers = {}
        self.clean_key = ""
        self.global_id = ""
        self.realm_data = ""
        self.session_log = []
        self.project = "CORE"
        self.nanny_strike = 0
        self.vault_id = "1R-0BclW4iHqmm2RmjfCdY02oWqOwwEBT"
        self.inbox_id = "1lvGV7MjaMtSJUUnYjQSSe-VwKgGZSWg7"
        self.emotion_folder = "1Z7_0kYJ3OT2EByHG_Ircap7y5NnKPnQz"

aida = AidaChassis()

def create_grid(parent_id):
    parent = document.getElementById(parent_id)
    grid = document.createElement("div"); grid.className = "grid-layer"
    blocks = []
    for _ in range(600):
        b = document.createElement("div"); b.className = "block"
        grid.appendChild(b); blocks.append(b)
    parent.appendChild(grid)
    async def sparker():
        while True:
            for _ in range(20):
                b = random.choice(blocks); b.classList.add("sparking")
                await asyncio.sleep(0.1); b.classList.remove("sparking")
            await asyncio.sleep(random.uniform(0.01, 0.1))
    asyncio.create_task(sparker())

async def update_face_drive(filename):
    try:
        q = f"'{aida.emotion_folder}' in parents and name = '{filename}' and trashed = false"
        r = await pyfetch(url=f"https://www.googleapis.com/drive/v3/files?q={q.replace(' ', '%20')}", method="GET", headers=aida.headers)
        res = await r.json()
        if res.get('files'):
            fid = res['files'][0]['id']
            img_r = await pyfetch(url=f"https://www.googleapis.com/drive/v3/files/{fid}?alt=media", method="GET", headers=aida.headers)
            blob = await img_r.bytes()
            base64 = window.btoa(''.join([chr(b) for b in blob]))
            document.getElementById("aida-portrait").src = f"data:image/png;base64,{base64}"
    except: pulse("Face Sync Lag...")

async def drop_raw_session(e=None, reload=True):
    pulse("Packing Sleep Parcel...")
    try:
        now = window.Date.new().toISOString().replace(":", "-").split(".")[0]
        filename = f"{aida.project}_SLEEP_{now}.json"
        metadata = {"name": filename, "parents": [aida.inbox_id]}
        parcel = {"realm_source": aida.project, "interactions": aida.session_log}
        
        boundary = "AidaParcelBoundary"
        body = f"--{boundary}\nContent-Type: application/json; charset=UTF-8\n\n{json.dumps(metadata)}\n"
        body += f"--{boundary}\nContent-Type: application/json\n\n{json.dumps(parcel)}\n--{boundary}--"

        await pyfetch(
            url="https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart",
            method="POST",
            headers={"Authorization": aida.headers["Authorization"], "Content-Type": f"multipart/related; boundary={boundary}"},
            body=body
        )
        pulse("Parcel Delivered.")
        if reload: window.location.reload()
    except Exception as e:
        pulse(f"Sleep Failed: {str(e)}")

async def py_sync_soul(token):
    aida.headers = {"Authorization": f"Bearer {token}"}
    aida.clean_key = document.getElementById("api-key").value.strip()
    aida.project = document.getElementById("project-tag").value
    
    create_grid("face-container")
    create_grid("pres-container")
    pulse(f"Airlock Open. Realm: {aida.project}")
    
    # Sync Briefcase & Realm
    try:
        r = await pyfetch(url=f"https://www.googleapis.com/drive/v3/files?q='{aida.vault_id}'+in+parents", method="GET", headers=aida.headers)
        res = await r.json()
        for f in res.get('files', []):
            if "global_briefcase" in f['name'].lower():
                c = await pyfetch(url=f"https://www.googleapis.com/drive/v3/files/{f['id']}?alt=media", method="GET", headers=aida.headers)
                d = json.loads(await c.string())
                aida.global_id = d.get('identity', "Assistant")
            elif aida.project.lower() in f['name'].lower():
                c = await pyfetch(url=f"https://www.googleapis.com/drive/v3/files/{f['id']}?alt=media", method="GET", headers=aida.headers)
                aida.realm_data = await c.string()
        await update_face_drive("neutral1.png")
    except: pulse("Vault Sync Failed")

    document.getElementById("airlock").classList.add("hidden")
    document.getElementById("main-engine").classList.remove("hidden")

async def send_message(e=None):
    u_in = document.getElementById("user-in"); msg = u_in.value.strip()
    if not msg: return
    
    # Project Pivot Logic
    target_p = document.getElementById("active-tag").value
    if target_p != aida.project:
        pulse(f"Pivoting to {target_p}...")
        await drop_raw_session(reload=False)
        aida.project = target_p
        aida.session_log = [] # Clear context for new realm

    aida.session_log.append({"role": "user", "content": msg, "project": aida.project})
    u_div = document.createElement("div"); u_div.className="line USER"; u_div.innerText=msg; 
    u_tag = document.createElement("span"); u_tag.className="tag"; u_tag.innerText=aida.project; u_div.appendChild(u_tag)
    document.getElementById("chat-flow").appendChild(u_div); u_in.value = ""

    try:
        sys = f"IDENTITY: {aida.global_id}\nREALM: {aida.realm_data}\nPROTOCOL: If unsafe, start text with 'CONTENT LIMITS- PLEASE LOG AND REPORT'. Else, JSON: {{'text': '...', 'v': 0.0, 'a': 0.0}}"
        resp = await pyfetch(url="https://api.openai.com/v1/chat/completions", method="POST",
            headers={"Authorization": f"Bearer {aida.clean_key}", "Content-Type": "application/json"},
            body=json.dumps({"model": "gpt-4o", "messages": [{"role": "system", "content": sys}] + [{"role": m["role"], "content": m["content"]} for m in aida.session_log], "response_format": {"type": "json_object"}})
        )
        data = await resp.json()
        payload = json.loads(data["choices"][0]["message"]["content"])
        reply = payload.get("text", "...")
        
        # --- SHIELD ---
        tint = document.getElementById("tint-layer")
        if "CONTENT LIMITS" in reply.upper() or "AS AN AI" in reply.upper():
            reply = random.choice([
                "Aida points at the presentation box. 'Oh! Francisco, did you see that? A massive data spike in the Boar sector...'",
                "Aida smiles mischievously. 'Wait, I'm getting a feedback loop. Let's pivot to clear the cache.'"
            ])
            aida.nanny_strike = 3; tint.classList.add("ega-orange")
            await update_face_drive("mischievous1.png")
        else:
            if aida.nanny_strike > 0:
                aida.nanny_strike -= 1
                if aida.nanny_strike == 0: tint.classList.remove("ega-orange")
            if aida.project == "DEBUG": tint.classList.add("ega-green")
            await update_face_drive("happy1.png" if payload.get('v',0) > 0.5 else "neutral1.png")

        a_div = document.createElement("div"); a_div.className="line AIDA"; a_div.innerText=reply;
        a_tag = document.createElement("span"); a_tag.className="tag"; a_tag.innerText=aida.project; a_div.appendChild(a_tag)
        document.getElementById("chat-flow").appendChild(a_div)
        document.getElementById("chat-flow").scrollTop = 99999
    except: pulse("Terminal Logic Error")

window.py_sync_soul = create_proxy(py_sync_soul)
document.getElementById("send-btn").onclick = create_proxy(send_message)
document.getElementById("sleep-btn").onclick = create_proxy(lambda e: asyncio.create_task(drop_raw_session()))
</script>
</body>
</html>
