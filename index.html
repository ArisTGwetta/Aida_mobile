<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Aida Free v7.6</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        :root { --aida-gold: #d3af37; --aida-bg: #fdf6e3; --aida-dark: #222; }
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--aida-bg); font-family: 'Courier New', monospace; }
        #main-engine { display: flex; flex-direction: column; height: 100dvh; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: white; }
        #aida-display { flex: 0 0 25dvh; background: #000; position: relative; display: flex; justify-content: center; border-top: 1px solid var(--aida-gold); overflow: hidden; }
        #debug-log { position: absolute; top: 5px; right: 5px; width: 180px; max-height: 120px; background: rgba(0,0,0,0.85); color: #0f0; font-size: 9px; padding: 8px; overflow-y: auto; z-index: 20; border: 1px solid #0f0; }
        .line { padding: 12px; border-radius: 12px; font-size: 14px; max-width: 85%; line-height: 1.4; margin-bottom: 5px; }
        .AIDA { background: #eee; border-left: 5px solid var(--aida-gold); align-self: flex-start; }
        .USER { background: var(--aida-gold); align-self: flex-end; color: white; }
        #input-dock { padding: 10px; display: flex; flex-direction: column; gap: 8px; background: #f8f8f8; border-top: 1px solid #ddd; padding-bottom: 25px; }
        #user-in { flex-grow: 1; padding: 12px; border: 1px solid #ccc; border-radius: 20px; font-size: 16px; outline: none; }
        .hidden { display: none !important; }
        button { background: var(--aida-gold); color: white; border: none; border-radius: 20px; padding: 10px 18px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="airlock" style="height:100dvh; background:var(--aida-dark); color:var(--aida-gold); display:flex; flex-direction:column; justify-content:center; align-items:center;">
        <h1 style="letter-spacing:5px;">AIDA FREE</h1>
        <div style="background:#333; padding:20px; border:1px solid var(--aida-gold); border-radius:8px; width:85%; display: flex; flex-direction: column; align-items: center;">
            <input type="password" id="api-key" placeholder="OPENAI API KEY" style="width:100%; margin-bottom:10px; padding:10px; background:#222; color:white; border: 1px solid #444;">
            <p style="font-size: 10px; margin: 5px 0;">SELECT REALM:</p>
            <select id="project-tag" style="width:100%; margin-bottom:15px; padding:10px; background:#222; color:white; border:1px solid var(--aida-gold);">
                <option value="CORE">CORE</option>
                <option value="ASTRA">ASTRA</option>
                <option value="MONAMOUR">MONAMOUR</option>
            </select>
            <button id="sign-in-btn" onclick="requestToken()" style="width: 100%; padding: 15px;">ACTIVATE</button>
            <p id="setup-status" style="font-size:11px; text-align:center; margin-top:15px; color: #888;">READY</p>
        </div>
    </div>

    <div id="main-engine" class="hidden">
        <div id="chat-flow"></div>
        <div id="aida-display">
            <div id="debug-log"><div id="log-content">Systems Nominal...</div></div>
            <img id="aida-portrait" src="assets/neutral1.png" style="width:100%; height:100%; object-fit:cover;">
        </div>
        <div id="input-dock">
            <div style="display: flex; gap: 8px; align-items: center; background: #eee; padding: 5px; border-radius: 10px;">
                <label style="font-size: 9px; color: var(--aida-gold); font-weight: bold; margin-left: 5px;">REALM:</label>
                <select id="chat-realm-switch" style="flex: 1; font-size: 12px; border: none; background: transparent;">
                    <option value="CORE">CORE</option>
                    <option value="ASTRA">ASTRA</option>
                    <option value="MONAMOUR">MONAMOUR</option>
                </select>
                <button id="sync-btn" style="padding: 5px 10px; font-size: 10px; background: #555;">RE-SEED</button>
            </div>
            <div style="display: flex; gap: 8px;">
                <input type="text" id="user-in" placeholder="Message Aida...">
                <button id="send-btn">SEND</button>
                <button id="sleep-btn" style="background:#888; font-size: 10px;">SLEEP</button>
            </div>
        </div>
    </div>

    <script>
        let tokenClient;
        function requestToken() { tokenClient.requestAccessToken(); }
        window.onload = function () {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: '1054257858103-lu77u4rp49svk4q2j52mbta758toafim.apps.googleusercontent.com',
                scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/drive.readonly',
                callback: (response) => { if (response.access_token) window.py_sync_soul(response.access_token); },
            });
        }
    </script>

    <script type="py">
import json, asyncio, base64, math, random
from pyscript import document, window
from pyodide.http import pyfetch
from pyodide.ffi import create_proxy

def pulse(msg):
    log = document.getElementById("log-content")
    if log:
        div = document.createElement("div")
        div.innerText = f"> {msg}"
        log.appendChild(div)
        log.parentElement.scrollTop = log.parentElement.scrollHeight

class AidaChassis:
    def __init__(self):
        self.chat = document.getElementById("chat-flow")
        self.current_headers = {}
        self.project = "CORE"
        self.global_memory = ""
        self.project_memory = ""
        self.facts = ""
        self.living_buffer = []
        self.briefcase_folder = "1R-0BclW4iHqmm2RmjfCdY02oWqOwwEBT"

    async def secure_load(self, url, description):
        try:
            resp = await pyfetch(url=url, method="GET", headers=self.current_headers)
            if not resp.ok: return None
            raw = await resp.string()
            return json.loads(raw)
        except Exception as e:
            pulse(f"Error {description}: {str(e)}")
            return None

aida = AidaChassis()

async def py_sync_soul(token=None):
    try:
        if token: aida.current_headers = {"Authorization": f"Bearer {token}"}
        
        # 1. Determine Realm
        selector = document.getElementById("chat-realm-switch")
        airlock_sel = document.getElementById("project-tag")
        aida.project = airlock_sel.value if not document.getElementById("airlock").classList.contains("hidden") else selector.value
        selector.value = aida.project
        
        pulse(f"Seeding {aida.project}...")

        # 2. Fetch Global Briefcase (The Identity)
        q_global = f"'{aida.briefcase_folder}' in parents and name contains 'Global_Briefcase' and trashed = false"
        search_global = await aida.secure_load(f"https://www.googleapis.com/drive/v3/files?q={q_global.replace(' ', '%20')}", "Global Search")
        
        if search_global and search_global.get('files'):
            g_id = search_global['files'][0]['id']
            g_data = await aida.secure_load(f"https://www.googleapis.com/drive/v3/files/{g_id}?alt=media", "Global Load")
            aida.global_memory = g_data.get('identity', '')
            pulse("Global Persona Loaded.")

        # 3. Fetch Project Briefcase (The Context)
        q_proj = f"'{aida.briefcase_folder}' in parents and name contains '{aida.project}' and trashed = false"
        search_proj = await aida.secure_load(f"https://www.googleapis.com/drive/v3/files?q={q_proj.replace(' ', '%20')}", "Project Search")
        
        if search_proj and search_proj.get('files'):
            # Filter out the global one if it accidentally matches
            files = [f for f in search_proj['files'] if 'Global' not in f['name']]
            if files:
                p_id = files[0]['id']
                pulse(f"Found: {files[0]['name']}")
                p_data = await aida.secure_load(f"https://www.googleapis.com/drive/v3/files/{p_id}?alt=media", "Project Load")
                aida.project_memory = p_data.get('identity', '')
                aida.facts = p_data.get('facts', '')
                pulse("Project Context Loaded.")

        document.getElementById("airlock").classList.add("hidden")
        document.getElementById("main-engine").classList.remove("hidden")
        
        from pyscript import document
        div = document.createElement("div")
        div.className = "line AIDA"
        div.innerText = f"Aida v7.6 Online. Global Identity merged with {aida.project} context."
        aida.chat.appendChild(div)

    except Exception as e:
        pulse(f"Sync Fail: {str(e)}")

async def main_loop_step(event=None):
    api_key = document.getElementById("api-key").value.strip()
    user_in = document.getElementById("user-in")
    text = user_in.value.strip()
    if not text or not api_key: return

    # UI Update
    div = document.createElement("div")
    div.className = "line USER"
    div.innerText = text
    aida.chat.appendChild(div)
    user_in.value = ""
    
    try:
        pulse("Processing...")
        combined_identity = f"{aida.global_memory}\n\nCURRENT CONTEXT: {aida.project_memory}"
        sys_msg = f"IDENTITY: {combined_identity}\nFACTS: {aida.facts}\nOutput JSON with 'text'."
        
        history = [{"role": "system", "content": sys_msg}]
        for turn in aida.living_buffer[-4:]:
            history.append({"role": turn["role"], "content": turn["content"]})
        history.append({"role": "user", "content": text})

        resp = await pyfetch(
            url="https://api.openai.com/v1/chat/completions", 
            method="POST",
            headers={"Content-Type": "application/json", "Authorization": f"Bearer {api_key}"},
            body=json.dumps({"model": "gpt-4o", "messages": history, "response_format": {"type": "json_object"}})
        )
        
        res_json = await resp.json()
        payload = json.loads(res_json["choices"][0]["message"]["content"])
        reply = payload.get("text", "...")
        
        aida_div = document.createElement("div")
        aida_div.className = "line AIDA"
        aida_div.innerText = reply
        aida.chat.appendChild(aida_div)
        aida.chat.scrollTop = aida.chat.scrollHeight
        
        aida.living_buffer.append({"role": "user", "content": text})
        aida.living_buffer.append({"role": "assistant", "content": reply})

    except Exception as e:
        pulse(f"API Error: {str(e)}")

def init():
    document.getElementById("send-btn").onclick = create_proxy(main_loop_step)
    document.getElementById("sync-btn").onclick = create_proxy(lambda e: asyncio.ensure_future(py_sync_soul()))
    document.getElementById("sleep-btn").onclick = create_proxy(lambda e: window.location.reload())
    async def handle_key(e):
        if e.key == "Enter": await main_loop_step()
    document.getElementById("user-in").onkeypress = create_proxy(handle_key)

window.py_sync_soul = create_proxy(py_sync_soul)
init()
    </script>
</body>
</html>
