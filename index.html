<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Aida Free v8.7</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        :root { --aida-gold: #d3af37; --aida-bg: #fdf6e3; --aida-dark: #222; }
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--aida-bg); font-family: 'Courier New', monospace; }
        #main-engine { display: flex; flex-direction: column; height: 100dvh; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: white; border-bottom: 2px solid var(--aida-gold); }
        #aida-display { flex: 0 0 30dvh; background: #000; display: flex; border-bottom: 2px solid var(--aida-gold); }
        #debug-log { flex: 0 0 35%; background: #111; color: #0f0; font-size: 10px; padding: 10px; overflow-y: auto; border-right: 1px solid #333; font-family: 'Consolas', monospace; }
        #aida-portrait-box { flex: 1; display: flex; justify-content: center; align-items: center; background: #000; }
        #aida-portrait { height: 100%; width: auto; object-fit: contain; }
        .line { padding: 12px; border-radius: 12px; font-size: 15px; max-width: 85%; line-height: 1.4; }
        .AIDA { background: #eee; border-left: 5px solid var(--aida-gold); align-self: flex-start; }
        .USER { background: var(--aida-gold); align-self: flex-end; color: white; }
        #input-dock { padding: 12px; background: #f8f8f8; display: flex; flex-direction: column; gap: 8px; }
        .controls-row { display: flex; gap: 10px; align-items: center; }
        #user-in { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 20px; font-size: 16px; }
        .hidden { display: none !important; }
        button { background: var(--aida-gold); color: white; border: none; border-radius: 20px; padding: 8px 15px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="airlock" style="height:100dvh; background:var(--aida-dark); color:var(--aida-gold); display:flex; flex-direction:column; justify-content:center; align-items:center;">
        <h1 style="letter-spacing:5px;">AIDA 8.7</h1>
        <div style="background:#333; padding:25px; border:1px solid var(--aida-gold); border-radius:10px; width:350px;">
            <input type="password" id="api-key" placeholder="OPENAI KEY" style="width:100%; padding:10px; margin-bottom:10px;">
            <select id="project-tag" style="width:100%; padding:10px; margin-bottom:10px;">
                <option value="CORE">CORE</option><option value="ASTRA">ASTRA</option><option value="MONAMOUR">MONAMOUR</option>
            </select>
            <div style="font-size: 10px; color: #aaa; margin-bottom: 15px;">
                <input type="checkbox" id="use-proxy" checked> Use Proxy Bridge
            </div>
            <button onclick="requestToken()" style="width:100%;">IGNITE</button>
        </div>
    </div>

    <div id="main-engine" class="hidden">
        <div id="chat-flow"></div>
        <div id="aida-display">
            <div id="debug-log"><div id="log-content">System Wake...</div></div>
            <div id="aida-portrait-box">
                <img id="aida-portrait" src="assets/neutral1.png" onerror="this.src='https://via.placeholder.com/400?text=AIDA+ACTIVE'">
            </div>
        </div>
        <div id="input-dock">
            <div class="controls-row">
                <button id="sleep-btn" style="background:#444; font-size:10px;">SLEEP/RELOAD</button>
                <div style="margin-left:auto; font-size:10px; color:#999;">V8.7 FORENSIC</div>
            </div>
            <div style="display: flex; gap: 8px;">
                <input type="text" id="user-in" placeholder="Talk to Aida...">
                <button id="send-btn">SEND</button>
            </div>
        </div>
    </div>

    <script>
        let tokenClient;
        function requestToken() { tokenClient.requestAccessToken(); }
        window.onload = function () {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: '1054257858103-lu77u4rp49svk4q2j52mbta758toafim.apps.googleusercontent.com',
                scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/drive.readonly',
                callback: (resp) => { if (resp.access_token) window.py_sync_soul(resp.access_token); },
            });
        }
    </script>

    <script type="py">
import json, asyncio, re
from pyscript import document, window
from pyodide.http import pyfetch
from pyodide.ffi import create_proxy

def pulse(msg):
    log = document.getElementById("log-content")
    if log:
        div = document.createElement("div")
        div.innerText = f"> {msg}"
        log.appendChild(div)
        log.parentElement.scrollTop = log.parentElement.scrollHeight

class AidaChassis:
    def __init__(self):
        self.headers = {}
        self.clean_key = ""
        self.global_id = "UNKNOWN"
        self.project_id = "UNKNOWN"
        self.facts = "UNKNOWN"
        self.folder_id = "1R-0BclW4iHqmm2RmjfCdY02oWqOwwEBT"

aida = AidaChassis()

async def py_sync_soul(token=None):
    aida.headers = {"Authorization": f"Bearer {token}"}
    aida.clean_key = re.sub(r'\s+', '', document.getElementById("api-key").value)
    p_tag = document.getElementById("project-tag").value
    
    pulse(f"Scanning Folder: {aida.folder_id}")

    try:
        q = f"'{aida.folder_id}' in parents and trashed=false"
        r = await pyfetch(url=f"https://www.googleapis.com/drive/v3/files?q={q.replace(' ', '%20')}", method="GET", headers=aida.headers)
        res = await r.json()
        files = res.get('files', [])
        pulse(f"Found {len(files)} files in Vault.")

        for f in files:
            pulse(f"Checking: {f['name']}")
            if "Global_Briefcase" in f['name']:
                pulse("Attempting Soul Load...")
                content = await pyfetch(url=f"https://www.googleapis.com/drive/v3/files/{f['id']}?alt=media", method="GET", headers=aida.headers)
                data = await content.json()
                aida.global_id = data.get('identity', 'MISSING_ID')
                pulse("Soul Baseline: LOADED")
            elif p_tag in f['name'] and "Global" not in f['name']:
                pulse(f"Attempting {p_tag} Load...")
                content = await pyfetch(url=f"https://www.googleapis.com/drive/v3/files/{f['id']}?alt=media", method="GET", headers=aida.headers)
                data = await content.json()
                aida.project_id = data.get('identity', 'MISSING_ID')
                aida.facts = data.get('facts', 'MISSING_FACTS')
                pulse(f"Realm {p_tag}: LOADED")
    except Exception as ex:
        pulse(f"RETRIEVAL ERROR: {str(ex)}")

    document.getElementById("airlock").classList.add("hidden")
    document.getElementById("main-engine").classList.remove("hidden")

async def send_message(e=None):
    u_in = document.getElementById("user-in")
    msg = u_in.value.strip()
    if not msg: return
    
    flow = document.getElementById("chat-flow")
    div = document.createElement("div"); div.className="line USER"; div.innerText=msg; flow.appendChild(div)
    u_in.value = ""; pulse("Thinking...")
    
    try:
        # Check if we actually have data to send
        pulse(f"Data Check: ID Len {len(aida.global_id)}")
        
        sys = f"IDENTITY: {aida.global_id}\nCONTEXT: {aida.project_id}\nFACTS: {aida.facts}\nBe Aida. Output JSON 'text'."
        
        url = "https://api.openai.com/v1/chat/completions"
        if document.getElementById("use-proxy").checked: url = f"https://corsproxy.io/?{url}"

        resp = await pyfetch(
            url=url, method="POST",
            headers={"Authorization": f"Bearer {aida.clean_key}", "Content-Type": "application/json"},
            body=json.dumps({"model": "gpt-4o", "messages": [{"role": "system", "content": sys}, {"role": "user", "content": msg}], "response_format": {"type": "json_object"}})
        )
        
        if not resp.ok:
            pulse(f"OpenAI Error: {resp.status}")
            return

        pulse("Handshake: OK")
        raw = await resp.json()
        reply = json.loads(raw["choices"][0]["message"]["content"]).get("text", "...")
        a_div = document.createElement("div"); a_div.className="line AIDA"; a_div.innerText=reply; flow.appendChild(a_div)
        flow.scrollTop = flow.scrollHeight
    except Exception as ex:
        pulse(f"Logic Error: {str(ex)}")

window.py_sync_soul = create_proxy(py_sync_soul)
document.getElementById("send-btn").onclick = create_proxy(send_message)
document.getElementById("sleep-btn").onclick = create_proxy(lambda e: window.location.reload())
</script>
</body>
</html>
