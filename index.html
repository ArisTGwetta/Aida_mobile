        :root { --aida-gold: #005f73; --aida-bg: #222; --aida-dark: #000; }
        
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: var(--aida-dark);
            font-family: 'Courier New', monospace;
        }
        
        #main-engine {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            overflow-y: auto;   /* ← the magic line */
        }
        
        #chat-flow {

            overflow-y: auto;

            flex-direction: column;
            gap: 10px;
            background: #000000;
            border-bottom: 2px solid var(--aida-gold);
        }
        
        :root {
            --debug-green: #00ff66;
        }
        
        #log-content .debug-line {
            color: var(--debug-green);
            font-family: monospace;
            font-size: 8px;
            opacity: 0.85;
            letter-spacing: 0.5px;
            white-space: pre-wrap;
        }
        #tag-bar {
            position: relative;
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 6px; /* small spacing above the input */
        }
        
        .tag-btn {
            background-color: black;
            color: white;
            border: 1px solid #333;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .tag-btn.used {
            color: #00ff66;
            border-color: #00ff66;
        }
        
        #tag-input {
            display: none;
            background-color: #111;
            color: #00ff66;
            border: 1px solid #00ff66;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 14px;
            width: 120px;
        }

        /* FIX #6: FULL FLICKER COVERAGE */
        #flicker-grid {
            position: absolute; /* Takes it out of the grid flow */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(90, 1fr);
            grid-template-rows: repeat(30, 1fr);
            z-index: 20; /* Sits on top of everything else in the display */
            pointer-events: none; /* Allows you to still click buttons underneath */
        }
        
        /* CHANGE #3: ADD INTENSE NEON COLOR GRID */
/* SOBER BLUE - Depth */
.-blue { 
    background: #005f73; /* Dark Aqua/Teal */
    box-shadow: 0 0 8px #0a9396;
    transition: background 0.3s ease, opacity 0.4s ease;
}

/* SHINY BUT SUBTLE WHITE */
.-white { 
    background: rgba(255, 255, 255, 0.7); /* Translucent white */
    box-shadow: 0 0 10px #fff;
    transition: all 0.2s ease;
}
        
.spark-blue { 
    background-color: #005f73 !important; 
    box-shadow: 0 0 10px #0a9396; 
    opacity: 1 !important;
    
}
.spark-white { 
    background-color: #ffffff !important; 
    box-shadow: 0 0 15px #ffffff; 
    opacity: 1 !important;
}
        
/* THE DROP EFFECT */
.drop {
    transform: translateY(10px); /* Small digital 'fall' */
    transition: transform 0.5s ease-out, opacity 0.5s ease-out;
}
        
        
        /* KEYPAD UI - Tactile & Sci-Fi */
        .keypad { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 12px; 
            margin-top: 20px;
            justify-items: center; /* Centers the buttons in their tracks */
        }

        .key { 
            background: #2a2a2a; 
            border: 1px solid var(--aida-gold); 
            color: var(--aida-gold); 
            padding: 18px; 
            border-radius: 12px; 
            font-size: 20px; 
            font-weight: bold; 
            cursor: pointer;
            transition: 0.1s;
            -webkit-tap-highlight-color: transparent; 
        }
        .key:active {
            background: var(--aida-gold);
            color: #000;
            transform: scale(0.95);
        }
        .key-clr { color: #ff4444; border-color: #ff4444; }
        
        #aida-display {
            flex: 0 0 30dvh;
            background: #000;
            display: grid;
            /* Two Columns: Portrait is 1.6x larger than the data column */
            grid-template-columns: 1.6fr 1fr; 
            position: relative;
            overflow: hidden;
        }
        
        /* This stacks the Debug and Presentation panes on top of each other */
        #debug-pane, #presentation-pane {
            /* REMOVE grid-column: 2 from here; the parent data-stack handles it */
            max-height: 10dvh;
            overflow-y: auto;
            font-size: 8px;
            background: #1a1a1a;       /* A dark gray so you can see the box */
            border-left: 1px solid #444;
            padding: 10px;
            display: flex;
            flex-direction: column;
            flex: 1;                   /* This forces them to split the space 50/50 */
            color: #00ff41;            /* Classic Matrix Green for visibility */
            text-shadow: 0 0 5px #00ff41;
        }

        /* --- VEIL --- */
        #veil {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
            z-index: 5000;
        }

        #veil.active {
            opacity: 1;
            pointer-events: auto;
        }
        
        #veil.fadeout {
            background: black;
            opacity: 1;
        }

        /* --- GRID MASK --- */
        .pixel-grid {
            position: absolute;
            inset: 0;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(4, 1fr);
            z-index: 998;
            pointer-events: none;
        }

        .pixel-grid div {
            opacity: 0;
            transform: translate(0,0);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        /* assemble */
        .pixel-grid.assemble div {
            opacity: 1;
            transform: translate(0,0);
        }

        /* dissolve */
        .pixel-grid.dissolve div {
            opacity: 0;
            transform: translate(
                calc((var(--dx) - 0.5) * 5px),
                calc((var(--dy) - 0.5) * 5px)
            );
        }

        /* --- SPARK LAYER --- */
        .spark-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .spark-layer.active {
            opacity: 1;
        }

        .spark {
            position: absolute;
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: spark-float 1.2s linear infinite;
        }

        @keyframes spark-float {
            0% { opacity: 0; transform: translateY(0); }
            20% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-20px); }
        }
          
        /* FIX #1: MATRIX GREEN & O */
        .tint-layer { position: absolute; inset: 0; pointer-events: none; z-index: 25; opacity: 0; transition: opacity 0.5s; }
        .debug-green { background: rgba(0, 255, 70, 0.3); mix-blend-mode: hard-light; }
        .alert-o { background: rgba(255, 80, 0, 0.4); mix-blend-mode: overlay; }
        .is-debug .debug-green { opacity: 1; }
        .is-alert .alert-o { opacity: 1; z-index: 40; }

        /* FIX #2: PORTRAIT SCALING */
        #portrait-pane { position: relative; z-index: 10; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #aida-portrait { height: 100%; width: 100%; object-fit: cover; image-rendering: auto; }
        
        #input-dock {

            align-items: center;
            gap: 10px;

        .controls {

        button {

            border: none;

        .line {

        .AIDA {
            background: #000000;      /* Solid black inside */
            color: #0a9396;           /* Crisp white text */
            border: 1px solid var(--aida-gold); /* The white border you wanted */

        }              
        
        .USER { background: var(--aida-gold); align-self: flex-end; color: white; }
        .hidden { display: none !important; }
    </style>
</head>
