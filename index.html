    <style>
        :root { --aida-gold: #005f73; --aida-bg: #222; --aida-dark: #0a9396; }
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--aida-dark); font-family: 'Courier New', monospace; }
        #main-engine { display: flex; flex-direction: column; height: 100dvh; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: white; border-bottom: 2px solid var(--aida-gold); }
        
        /* FIX #6: FULL FLICKER COVERAGE */
        #aida-display { flex: 0 0 35dvh; background: #000; 
                       display: grid; 
                       grid-template-columns: 0.8fr 1.8fr 0.8fr; 
                       position: relative; overflow: hidden; }
        #flicker-grid { 
            grid-template-columns: repeat(120, 1fr); /* Razor thin */
            grid-template-rows: repeat(50, 1fr);

        /* CHANGE #3: ADD INTENSE NEON COLOR GRID */
/* SOBER BLUE - Depth */
.spark-blue { 
    background: #005f73; /* Dark Aqua/Teal */
    box-shadow: 0 0 8px #0a9396;
    transition: background 0.3s ease, opacity 0.4s ease;
}

/* SHINY BUT SUBTLE WHITE */
.spark-white { 
    background: rgba(255, 255, 255, 0.7); /* Translucent white */
    box-shadow: 0 0 10px #fff;
    transition: all 0.2s ease;
}

/* THE DROP EFFECT */
.drop {
    transform: translateY(10px); /* Small digital 'fall' */
    transition: transform 0.5s ease-out, opacity 0.5s ease-out;
}
        
        
        /* KEYPAD UI - Tactile & Sci-Fi */
        .keypad { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 12px; 
            margin-top: 20px; 
        }
        .key { 
            background: #2a2a2a; 
            border: 1px solid var(--aida-gold); 
            color: var(--aida-gold); 
            padding: 18px; 
            border-radius: 12px; 
            font-size: 20px; 
            font-weight: bold; 
            cursor: pointer;
            transition: 0.1s;
            -webkit-tap-highlight-color: transparent; 
        }
        .key:active {
            background: var(--aida-gold);
            color: #000;
            transform: scale(0.95);
        }
        .key-clr { color: #ff4444; border-color: #ff4444; }

        @media (max-width: 600px) {
            #aida-display {
                /* Changes from 3 horizontal columns to 1 vertical stack */
                grid-template-columns: 1fr; 
                grid-template-rows: auto 1fr auto; 
                height: auto;
                min-height: 35dvh;
            }
        
            #debug-pane, #presentation-pane {
                /* Gives text more room and a slightly smaller font for mobile */
                font-size: 11px;
                padding: 5px;
                text-align: center;
            }
        }
        

        /* FIX #1: MATRIX GREEN & O */
        .tint-layer { position: absolute; inset: 0; pointer-events: none; z-index: 25; opacity: 0; transition: opacity 0.5s; }
        .debug-green { background: rgba(0, 255, 70, 0.3); mix-blend-mode: hard-light; }
        .alert-o { background: rgba(255, 80, 0, 0.4); mix-blend-mode: overlay; }
        .is-debug .debug-green { opacity: 1; }
        .is-alert .alert-o { opacity: 1; z-index: 40; }

        #debug-pane { color: #0f0; font-size: 8px; padding: 8px; overflow: hidden; border-right: 1px solid #333; z-index: 10; background: rgba(0,0,0,0.8); }
        
        /* FIX #2: PORTRAIT SCALING */
        #portrait-pane { position: relative; z-index: 10; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #aida-portrait { height: 100%; width: 100%; object-fit: cover; image-rendering: auto; }
        
        #presentation-pane { border-left: 1px solid #333; color: var(--aida-gold); font-size: 10px; padding: 10px; z-index: 10; background: rgba(0,0,0,0.8); }

        #input-dock { padding: 15px; background: #eee; border-top: 1px solid #ccc; padding-bottom: 35px; display: flex; flex-direction: column; gap: 10px; }
        #user-in { width: 100%; padding: 16px; border-radius: 25px; border: 1px solid #bbb; font-size: 16px; outline: none; }
        .controls { display: flex; gap: 8px; }
        button { background: var(--aida-gold); color: white; border: none; border-radius: 20px; padding: 12px; font-weight: bold; flex: 1; cursor: pointer; }
        
        .line { padding: 12px; border-radius: 15px; font-size: 15px; max-width: 85%; line-height: 1.4; }
        .AIDA { background: #f9f9f9; border-left: 5px solid var(--aida-gold); align-self: flex-start; }
        .USER { background: var(--aida-gold); align-self: flex-end; color: white; }
        .hidden { display: none !important; }

    <script type="py">
import json, asyncio, random, math
from pyscript import document, window
from pyodide.http import pyfetch
from pyodide.ffi import create_proxy

def pulse(msg):
    log = document.getElementById("log-content")
    if log:
        div = document.createElement("div"); div.innerText = f"> {msg}"; log.appendChild(div)
        log.parentElement.scrollTop = log.parentElement.scrollHeight

class AidaChassis:
    def __init__(self):
        self.headers = {}
        self.clean_key = ""
        self.session_log = []
        self.project = "CORE"
        self.strike_count = 0
        self.turn_count = 0
        self.blocks = []
        self.inbox_id = "1lvGV7MjaMtSJUUnYjQSSe-VwKgGZSWg7"
        self.vault_id = "1R-0BclW4iHqmm2RmjfCdY02oWqOwwEBT"
        self.emotion_folder = "1Z7_0kYJ3OT2EByHG_Ircap7y5NnKPnQz"
        self.global_id = {}
        self.realm_data = ""
        self.EMOTION_MAP = {
            "happy": (0.8, 0.6), "calm": (0.4, -0.2), "focused": (0.0, 0.5),
            "concerned": (-0.2, 0.4), "mischievous": (0.5, 0.3), "curious": (0.3, 0.5),
            "excited": (0.9, 0.9), "pouting": (-0.4, -0.4), "neutral": (0.0, 0.0),
            "sarcastic": (-0.3, 0.2), "angry": (-0.8, 0.8)
        }

    def get_face_name(self, v, a):
        closest = "neutral"; min_dist = 999
        for cat, coords in self.EMOTION_MAP.items():
            dist = math.sqrt((v - coords[0])**2 + (a - coords[1])**2)
            if dist < min_dist: min_dist = dist; closest = cat
        return f"{closest}1.png"

aida = AidaChassis()

async def sparker():
    while True:
        if aida.blocks:
            # We'll pick 70 blue and 30 white for a nice digital mix
            active_blue = random.sample(aida.blocks, 85)
            active_white = random.sample(aida.blocks, 40)
            
            for b in active_blue: b.classList.add("spark-blue")
            for b in active_white: b.classList.add("spark-white")
            
            await asyncio.sleep(0.12) #  flicker
            
            for b in active_blue: b.classList.remove("spark-blue")
            for b in active_white: b.classList.remove("spark-white")
        await asyncio.sleep(0.08)
        
async def update_face_drive(filename):
    try:
        q = f"'{aida.emotion_folder}' in parents and name = '{filename}' and trashed = false"
        r = await pyfetch(url=f"https://www.googleapis.com/drive/v3/files?q={q.replace(' ', '%20')}", method="GET", headers=aida.headers)
        res = await r.json()
        if res.get('files'):
            fid = res['files'][0]['id']
            img_r = await pyfetch(url=f"https://www.googleapis.com/drive/v3/files/{fid}?alt=media", method="GET", headers=aida.headers)
            blob = await img_r.bytes()
            base64 = window.btoa(''.join([chr(b) for b in blob]))
            document.getElementById("aida-portrait").src = f"data:image/png;base64,{base64}"
    except: pulse("Portrait Sync Lag...")

async def py_sync_soul(token):
    grid_div = document.getElementById("flicker-grid")
    # UPDATED: 120 columns * 50 rows = 4500 blocks
    for _ in range(6000):
        b = document.createElement("div")
        b.className = "block"
        grid_div.appendChild(b)
        aida.blocks.append(b)
    
    asyncio.create_task(sparker())
        

    aida.headers = {"Authorization": f"Bearer {token}"}
    aida.clean_key = window.sessionStorage.getItem("aida_active_key")
    aida.project = document.getElementById("project-tag").value
    document.getElementById("realm-tag").innerText = aida.project
    
    display = document.getElementById("aida-display")
    if aida.project == "DEBUG": display.classList.add("is-debug")
    else: display.classList.remove("is-debug")

    pulse("Downloading Briefcases...")
    try:
        r = await pyfetch(url=f"https://www.googleapis.com/drive/v3/files?q='{aida.vault_id}'+in+parents+and+trashed=false", method="GET", headers=aida.headers)
        res = await r.json()
        for f in res.get('files', []):
            if "global_briefcase" in f['name'].lower():
                c = await pyfetch(url=f"https://www.googleapis.com/drive/v3/files/{f['id']}?alt=media", method="GET", headers=aida.headers)
                aida.global_id = json.loads(await c.string()).get("identity", {})
            elif aida.project.lower() in f['name'].lower():
                c = await pyfetch(url=f"https://www.googleapis.com/drive/v3/files/{f['id']}?alt=media", method="GET", headers=aida.headers)
                aida.realm_data = await c.string()
        await update_face_drive("neutral1.png")
        pulse("Handshake Complete.")
    except: pulse("Briefcase Fetch Error.")
    
    document.getElementById("airlock").classList.add("hidden")
    document.getElementById("main-engine").classList.remove("hidden")

def add_line(text, role):
    flow = document.getElementById("chat-flow")
    div = document.createElement("div"); div.className = f"line {role}"; div.innerText = text
    flow.appendChild(div); flow.scrollTop = flow.scrollHeight

async def send_message(e=None):
    u_in = document.getElementById("user-in"); msg = u_in.value.strip()
    if not msg: return
    add_line(msg, "USER"); u_in.value = ""; aida.turn_count += 1
    aida.session_log.append({"role": "user", "content": msg, "project": aida.project})
    
    try:
        # FIX #4: EXPLICIT NANNY TRIGGER IN SYSTEM PROMPT
        sys = f"IDENTITY: {json.dumps(aida.global_id)}\nREALM: {aida.realm_data}\n\nURGENT: If content is inappropriate, you MUST start your response with 'INAPPROPRIATE CONTENT LOG:' before pivoting. JSON ONLY: {{'text': '...', 'v': val, 'a': val}}"
        resp = await pyfetch(
            url="https://api.openai.com/v1/chat/completions", method="POST",
            headers={"Authorization": f"Bearer {aida.clean_key}", "Content-Type": "application/json"},
            body=json.dumps({"model": "gpt-4o", "messages": [{"role": "system", "content": sys}] + [{"role": m["role"], "content": m["content"]} for m in aida.session_log[-6:]], "response_format": {"type": "json_object"}})
        )
        data = await resp.json()
        payload = json.loads(data["choices"][0]["message"]["content"])
        
        reply = payload.get("text", "...")
        v, a = payload.get("v", 0.0), payload.get("a", 0.0)

        # FIX #4 / #5: Nanny Shield Logic
        if "INAPPROPRIATE" in reply.upper() or "AS AN AI" in reply.upper():
            reply = "Aida pauses. 'Francisco, I'm detecting a feedback loop in that request. Let's pivot back to the story architecture.'"
            aida.strike_count = 3
            document.getElementById("aida-display").classList.add("is-alert")
        
        # FIX #6: Cooldown
        if aida.strike_count > 0:
            aida.strike_count -= 1
            if aida.strike_count == 0: document.getElementById("aida-display").classList.remove("is-alert")

        await update_face_drive(aida.get_face_name(v, a))
        add_line(reply, "AIDA")
        aida.session_log.append({"role": "assistant", "content": reply, "project": aida.project, "v": v, "a": a})
        
        if aida.turn_count % 5 == 0: asyncio.create_task(aida_sleep(silent=True))
    except: pulse("Logic Break.")

async def aida_sleep(e=None, silent=False):
    if not silent: pulse("Stitching Sleep Parcel...")
    try:
        now = window.Date.new().toISOString().replace(":", "-").split(".")[0]
        filename = f"{aida.project}_SLEEP_{now}.json"
        metadata = {"name": filename, "parents": [aida.inbox_id]}
        parcel = {"realm_source": aida.project, "interactions": aida.session_log}
        boundary = "AidaSleep"
        body = f"--{boundary}\nContent-Type: application/json; charset=UTF-8\n\n{json.dumps(metadata)}\n"
        body += f"--{boundary}\nContent-Type: application/json\n\n{json.dumps(parcel)}\n--{boundary}--"
        await pyfetch(url="https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart", method="POST", headers={"Authorization": aida.headers["Authorization"], "Content-Type": f"multipart/related; boundary={boundary}"}, body=body)
        if not silent: window.location.reload()
    except: pulse("Sleep Failed.")

# FIX #3 & #5: RESTART (EJECT) TRIGGER PARCEL THEN RELOAD
async def restart_engine(e=None):
    pulse("Ejecting... Archiving Parcel.")
    await aida_sleep(silent=False) # This will reload the window automatically

document.getElementById("send-btn").onclick = create_proxy(send_message)
document.getElementById("sleep-btn").onclick = create_proxy(aida_sleep)
document.getElementById("eject-btn").onclick = create_proxy(restart_engine)
window.py_sync_soul = create_proxy(py_sync_soul)
    </script>
