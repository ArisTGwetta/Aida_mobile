<!DOCTYPE html>
<html>
<head>
    <title>AIDA-ONE | Unified Consciousness</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <script src="011-butler_keys.js"></script> 
    <script src="001-buttler_amber.js"></script>
    <script src="002-librarian_green.js"></script>
    <script src="008-crawler_green.js"></script>
    <script src="003-emotion_blue.js"></script>
    <script src="004-identity_white.js"></script>
    <script src="005-realm_silver.js"></script>
    <script src="006-role_silver.js"></script>
    <script src="009-tetrad_silver.js"></script>
    <script src="007-soul_sync_blue.js"></script>
    <script src="010-chassis_gold.js"></script>

    <style>
        :root { --ega-green: #00ff41; --ega-amber: #ffb000; --ega-blue: #00d4ff; }
        body { background: #000; color: var(--ega-green); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; height: 100vh; }
        
        /* BIOS SCREEN */
        #bios-screen { padding: 20px; height: 100vh; overflow-y: auto; box-sizing: border-box; }
        .log-amber { color: var(--ega-amber); }
        .log-green { color: var(--ega-green); }
        .log-blue { color: var(--ega-blue); }
        .log-white { color: #fff; }
        
        /* AIRLOCK KEYPAD */
        #airlock { 
            position: fixed; inset: 0; background: #000; z-index: 100; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
        }
        #scramble-pin { 
            background: transparent; border: none; color: var(--ega-amber); 
            font-size: 2.5rem; text-align: center; width: 100%; outline: none; margin-bottom: 20px;
        }
        .keypad-grid { display: grid; grid-template-columns: repeat(3, 80px); gap: 15px; }
        .key-btn { 
            padding: 20px; border: 1px solid var(--ega-green); background: transparent; 
            color: var(--ega-green); font-family: 'Courier New'; cursor: pointer; font-size: 1.2rem;
        }

        #keypad-launch-btn { 
            position: fixed; bottom: 40px; right: 40px; padding: 20px 40px;
            background: transparent; border: 2px solid var(--ega-green); color: var(--ega-green);
            cursor: pointer; font-weight: bold; text-transform: uppercase; z-index: 50;
        }

        /* INTERFACE */
        #aida-interface { display: none; flex-direction: column; height: 100vh; width: 100vw; position: relative; }
        
        /* CHASSIS ELEMENTS FOR 010-CHASSIS_GOLD */
        #hologram-stage { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        #pixelGrid { position: absolute; inset: 0; opacity: 0.1; pointer-events: none; }
        #sparkLayer { position: absolute; inset: 0; pointer-events: none; }
        #emotion-face { width: 200px; height: 200px; z-index: 10; image-rendering: pixelated; }

        #terminal-output { height: 35%; padding: 15px; overflow-y: auto; font-size: 14px; background: rgba(0,10,0,0.9); border-top: 1px solid var(--ega-green); }
        #input-area { padding: 10px; display: flex; background: #000; gap: 10px; border-top: 1px solid var(--ega-green); }
        #user-input { flex: 1; background: transparent; border: 1px solid var(--ega-green); color: var(--ega-green); padding: 10px; outline: none; }
        #send-btn { background: var(--ega-green); color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="bios-screen">
        <div id="bios-logs">
            <div class="log-white">>>> INITIALIZING AIDA_ONE...</div>
        </div>
    </div>

    <div id="airlock">
        <div class="log-amber" style="margin-bottom:10px;">SECURE HANDSHAKE REQUIRED</div>
        <input type="text" id="scramble-pin" readonly placeholder="***">
        <div class="keypad-grid">
            <button class="key-btn" onclick="pressKey('1')">1</button>
            <button class="key-btn" onclick="pressKey('2')">2</button>
            <button class="key-btn" onclick="pressKey('3')">3</button>
            <button class="key-btn" onclick="pressKey('4')">4</button>
            <button class="key-btn" onclick="pressKey('5')">5</button>
            <button class="key-btn" onclick="pressKey('6')">6</button>
            <button class="key-btn" onclick="pressKey('7')">7</button>
            <button class="key-btn" onclick="pressKey('8')">8</button>
            <button class="key-btn" onclick="pressKey('9')">9</button>
            <button class="key-btn" onclick="pressKey('C')">C</button>
            <button class="key-btn" onclick="pressKey('0')">0</button>
            <button class="key-btn" style="color:var(--ega-amber); border-color:var(--ega-amber);" onclick="requestToken()">OK</button>
        </div>
    </div>

    <button id="keypad-launch-btn" class="hidden">Initiate Handshake</button>

    <div id="aida-interface">
        <div id="hologram-stage">
            <div id="pixelGrid"></div> <div id="sparkLayer"></div> <img id="emotion-face" src="assets/standby.png">
        </div>
        <div id="terminal-output">
            <div class="log-blue">Aida_One initialized. Soul Sync active.</div>
        </div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Communicate...">
            <button id="send-btn">SEND</button>
        </div>
    </div>

<script>
    let tokenClient;
    let pyodide;

    function uiLog(msg, colorClass) {
        const div = document.createElement("div");
        div.className = colorClass;
        div.innerText = `>>> ${msg}`;
        document.getElementById("bios-logs").appendChild(div);
    }

    function pressKey(val) {
        const input = document.getElementById("scramble-pin");
        // We store the real sequence in a data attribute
        if (!input.dataset.realPin) input.dataset.realPin = "";
        
        if (val === 'C') {
            input.value = "";
            input.dataset.realPin = "";
        } else if (input.dataset.realPin.length < 12) {
            input.dataset.realPin += val;
            // The user only sees stars, keeping the "Secure Handshake" vibe
            input.value = "*".repeat(input.dataset.realPin.length);
        }
    }

    function requestToken() {
        const rawPin = document.getElementById("scramble-pin").value;
        const pin = rawPin.replace(/0/g, ''); 
        if(pin.length === 3) {
            const assembled = "sk-proj-" + VAULT_FRAGMENTS[pin[0]] + VAULT_FRAGMENTS[pin[1]] + VAULT_FRAGMENTS[pin[2]];
            sessionStorage.setItem("aida_active_key", assembled);
            tokenClient.requestAccessToken();
        } else { alert("ACCESS DENIED"); }
    }

    window.onload = async function () {
        uiLog("Beginning Boot Sequence...", "log-white");
        
        // Actually load Pyodide instead of just logging it
        pyodide = await loadPyodide();
        uiLog("Engine Warmed.", "log-amber");

        setTimeout(() => uiLog("Butler Keys Synchronized", "log-amber"), 500);
        setTimeout(() => uiLog("Librarian Active", "log-green"), 1000);
        setTimeout(() => {
            uiLog("Soul Sync Ready. Concentration Complete.", "log-blue");
            document.getElementById("keypad-launch-btn").classList.remove("hidden");
        }, 1500);

        document.getElementById("keypad-launch-btn").onclick = () => {
            document.getElementById("airlock").style.display = "flex";
        };

        // Google Handshake
        const checkGoogle = setInterval(() => {
            if (typeof google !== 'undefined') {
                clearInterval(checkGoogle);
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: '1054257858103-lu77u4rp49svk4q2j52mbta758toafim.apps.googleusercontent.com',
                    scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/drive.readonly',
                    callback: (resp) => { 
                        if (resp.access_token) {
                            // 1. CLEAR THE DECKS (Kill BIOS, Keypad, and Launch Button)
                            document.getElementById("airlock").style.display = "none";
                            document.getElementById("bios-screen").style.display = "none";
                            document.getElementById("keypad-launch-btn").style.display = "none";
                            
                            // 2. REVEAL THE SOUL (Show the Interface)
                            const interface = document.getElementById("aida-interface");
                            interface.style.display = "flex";
                            
                            // 3. IGNITE THE CHASSIS (Trigger the arrival animation)
                            // We use a tiny delay (50ms) to make sure the interface is 
                            // "drawn" on the screen before the sparks start flying.
                            setTimeout(() => {
                                if(window.aida_arrive) {
                                    console.log(">>> CHASSIS: Igniting Hologram...");
                                    window.aida_arrive();
                                } else {
                                    console.error(">>> CHASSIS: 010-chassis_gold.js not found!");
                                }
                            }, 50);
                        }
                    },
                });
            }
        }, 100);
    };

    // BRIDGE TO SOUL SYNC
    document.getElementById("send-btn").onclick = async function() {
        const input = document.getElementById("user-input");
        const term = document.getElementById("terminal-output");
        if (!input.value) return;
    
        const userMsg = input.value;
        term.innerHTML += `<div style="color:#888">> YOU: ${userMsg}</div>`;
        input.value = "";
    
        try {
            // CALLING THE ACTUAL SOUL SYNC
            // This runs the Python engine and returns her state
            const aidaResponse = await pyodide.runPythonAsync(`
    import json
    from soul_sync_engine import py_sync_soul
    
    # Temporary state for the bridge
    mock_id = {"identity": {"name": "Aida", "tone": "playful"}}
    mock_emo = {"valence": 0.5, "arousal": 0.1}
    
    # Execute the sync
    state = py_sync_soul(mock_id, {}, {}, mock_emo)
    f"Identity Synced. Current Mood: {state['emotion']['label']}. I am ready for the ${userMsg} protocol."
            `);
    
            term.innerHTML += `<div class="log-green">> AIDA: ${aidaResponse}</div>`;
        } catch(e) {
            term.innerHTML += `<div class="log-error">> SYNC ERROR: Engine is cold.</div>`;
        }
        term.scrollTop = term.scrollHeight;
    };
</script>

</body>
</html>
