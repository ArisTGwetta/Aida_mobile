<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Aida Free v9.6.6</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        :root { --aida-gold: #d3af37; --aida-bg: #fdf6e3; --aida-dark: #222; }
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--aida-bg); font-family: 'Courier New', monospace; }
        #main-engine { display: flex; flex-direction: column; height: 100dvh; }
        
        #aida-display { 
            flex: 0 0 30dvh; 
            background: #000; 
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr;
            border-bottom: 2px solid var(--aida-gold);
            position: relative;
            overflow: hidden;
        }

        /* HIGH-DENSITY FLICKER GRID */
        #flicker-grid {
            position: absolute; inset: 0;
            display: grid;
            grid-template-columns: repeat(20, 1fr); /* Horizontal Size */
            grid-template-rows: repeat(100, 1fr);   /* Vertical Density (Adjusted to 100) */
            z-index: 20;
            pointer-events: none;
        }
        .block { border: 0.1px solid rgba(211, 175, 55, 0.02); }
        .spark { background: rgba(211, 175, 55, 0.15); } /* The "Flicker" color */

        .tint-layer { position: absolute; inset: 0; pointer-events: none; z-index: 5; opacity: 0; transition: opacity 0.3s; }
        .debug-green { background: rgba(0, 255, 60, 0.15); mix-blend-mode: color; }
        .alert-orange { background: rgba(255, 110, 0, 0.25); mix-blend-mode: color; }
        
        .is-debug .debug-green { opacity: 1; }
        .is-alert .alert-orange { opacity: 1; z-index: 6; }

        #debug-pane { color: #0f0; font-size: 9px; padding: 10px; overflow: hidden; border-right: 1px solid #333; z-index: 10; }
        #portrait-pane { position: relative; overflow: hidden; z-index: 10; }
        #portrait-pane img { width: 100%; height: 100%; object-fit: cover; }
        #presentation-pane { border-left: 1px solid #333; color: var(--aida-gold); font-size: 10px; padding: 10px; z-index: 10; }

        #chat-flow { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: white; }
        .line { padding: 12px; border-radius: 12px; font-size: 14px; max-width: 85%; }
        .AIDA { background: #eee; border-left: 5px solid var(--aida-gold); align-self: flex-start; }
        .USER { background: var(--aida-gold); align-self: flex-end; color: white; }
        
        #input-dock { padding: 10px; background: #f8f8f8; border-top: 1px solid #ddd; padding-bottom: 25px; }
        #user-in { width: 70%; padding: 12px; border-radius: 20px; border: 1px solid #ccc; }
        button { background: var(--aida-gold); color: white; border: none; border-radius: 20px; padding: 10px 15px; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="airlock" style="height:100dvh; background:var(--aida-dark); color:var(--aida-gold); display:flex; flex-direction:column; justify-content:center; align-items:center;">
        <h1 style="letter-spacing:5px;">AIDA 9.6.6</h1>
        <div style="background:#333; padding:20px; border:1px solid var(--aida-gold); border-radius:8px; width:80%;">
            <input type="password" id="api-key" placeholder="OPENAI API KEY" style="width:100%; margin-bottom:10px; padding:8px;">
            <select id="project-tag" style="width:100%; margin-bottom:10px; padding:8px;">
                <option value="CORE">CORE</option>
                <option value="ASTRA">ASTRA</option>
                <option value="DEBUG">DEBUG</option>
                <option value="NEW_PROJECT">+ NEW REALM</option>
            </select>
            <button onclick="requestToken()" style="width:100%;">IGNITE ENGINE</button>
        </div>
    </div>

    <div id="main-engine" class="hidden">
        <div id="aida-display">
            <div id="flicker-grid"></div> <div id="debug-pane"><div id="log-content"></div></div>
            <div id="portrait-pane">
                <div class="tint-layer debug-green"></div>
                <div class="tint-layer alert-orange"></div>
                <img id="aida-portrait" src="assets/neutral1.png">
            </div>
            <div id="presentation-pane"><div id="realm-tag"></div><div id="pres-content"></div></div>
        </div>
        <div id="chat-flow"></div>
        <div id="input-dock">
            <input type="text" id="user-in" placeholder="Command Aida...">
            <button id="send-btn">SEND</button>
            <button id="sleep-btn" style="background:#444; font-size:9px;">SLEEP</button>
        </div>
    </div>

    <script>
        let tokenClient;
        function requestToken() { tokenClient.requestAccessToken(); }
        window.onload = function () {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: '1054257858103-lu77u4rp49svk4q2j52mbta758toafim.apps.googleusercontent.com',
                scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/drive.readonly',
                callback: (resp) => { if (resp.access_token) window.py_sync_soul(resp.access_token); },
            });
        }
    </script>

    <script type="py">
import json, asyncio, random
from pyscript import document, window
from pyodide.http import pyfetch
from pyodide.ffi import create_proxy

class AidaChassis:
    def __init__(self):
        self.project = "CORE"
        self.new_project_name = None
        self.nanny_strike = 0
        self.blocks = []

    def pulse(self, msg):
        log = document.getElementById("log-content")
        div = document.createElement("div"); div.innerText = f"> {msg}"; log.appendChild(div)
        log.parentElement.scrollTop = log.parentElement.scrollHeight

aida = AidaChassis()

async def sparker():
    # 15-20% constant flicker logic
    while True:
        active_set = random.sample(aida.blocks, 300) # 15% of 2000
        for b in active_set: b.classList.add("spark")
        await asyncio.sleep(0.15)
        for b in active_set: b.classList.remove("spark")
        await asyncio.sleep(0.05)

async def py_sync_soul(token):
    # Initialize Grid
    grid_div = document.getElementById("flicker-grid")
    for _ in range(2000):
        b = document.createElement("div"); b.className = "block"
        grid_div.appendChild(b); aida.blocks.append(b)
    
    asyncio.create_task(sparker())
    
    aida.project = document.getElementById("project-tag").value
    document.getElementById("realm-tag").innerText = f"REALM: {aida.project}"
    if aida.project == "DEBUG": document.getElementById("aida-display").classList.add("is-debug")
    
    document.getElementById("airlock").classList.add("hidden")
    document.getElementById("main-engine").classList.remove("hidden")
    aida.pulse("Engine Ignited.")

async def main_loop_step(event=None):
    user_in = document.getElementById("user-in"); text = user_in.value.strip()
    if not text: return
    
    # NEW PROJECT NAME CAPTURE
    if aida.project == "NEW_PROJECT" and not aida.new_project_name:
        aida.new_project_name = text
        aida.pulse(f"New Realm Set: {text}")
        # Transition logic...
    
    # Rest of your standard logic...
    user_in.value = ""

document.getElementById("send-btn").onclick = create_proxy(main_loop_step)
document.getElementById("sleep-btn").onclick = create_proxy(lambda e: asyncio.create_task(py_sleep()))
    </script>
</body>
</html>
