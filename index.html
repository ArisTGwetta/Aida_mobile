<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Aida Free v9.3</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        :root { --aida-gold: #d3af37; --aida-bg: #fdf6e3; --aida-dark: #222; }
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--aida-bg); font-family: 'Courier New', monospace; }
        #main-engine { display: flex; flex-direction: column; height: 100dvh; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: white; border-bottom: 2px solid var(--aida-gold); }
        #aida-display { flex: 0 0 35dvh; background: #000; display: flex; border-bottom: 2px solid var(--aida-gold); }
        #debug-log { flex: 0 0 45%; background: #111; color: #0f0; font-size: 10px; padding: 10px; overflow-y: auto; border-right: 1px solid #333; }
        #aida-portrait-box { flex: 1; display: flex; justify-content: center; align-items: center; background: #000; }
        #aida-portrait { height: 100%; width: auto; object-fit: contain; }
        .line { padding: 12px; border-radius: 12px; font-size: 15px; max-width: 85%; }
        .AIDA { background: #eee; border-left: 5px solid var(--aida-gold); align-self: flex-start; }
        .USER { background: var(--aida-gold); align-self: flex-end; color: white; }
        #input-dock { padding: 12px; background: #f8f8f8; display: flex; flex-direction: column; gap: 8px; }
        button { background: var(--aida-gold); color: white; border: none; border-radius: 20px; padding: 8px 15px; font-weight: bold; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="airlock" style="height:100dvh; background:var(--aida-dark); color:var(--aida-gold); display:flex; flex-direction:column; justify-content:center; align-items:center;">
        <h1 style="letter-spacing:5px;">AIDA 9.3</h1>
        <div style="background:#333; padding:25px; border:1px solid var(--aida-gold); border-radius:10px; width:350px;">
            <input type="password" id="api-key" placeholder="OPENAI KEY" style="width:100%; padding:10px; margin-bottom:10px; background:#111; color:white; border:1px solid #444;">
            <select id="project-tag" style="width:100%; padding:10px; margin-bottom:15px; background:#111; color:white; border:1px solid var(--aida-gold);">
                <option value="CORE">CORE</option><option value="ASTRA">ASTRA</option><option value="MONAMOUR">MONAMOUR</option>
            </select>
            <div style="font-size: 11px; margin-bottom: 15px; color: #aaa;"><input type="checkbox" id="use-proxy"> Enable Proxy Bridge</div>
            <button onclick="requestToken()" style="width:100%;">STITCH SOUL</button>
        </div>
    </div>

    <div id="main-engine" class="hidden">
        <div id="chat-flow"></div>
        <div id="aida-display">
            <div id="debug-log"><div id="log-content">Stitching Sequence...</div></div>
            <div id="aida-portrait-box">
                <img id="aida-portrait" src="assets/neutral1.png" onerror="this.src='https://via.placeholder.com/400?text=AIDA+ACTIVE'">
            </div>
        </div>
        <div id="input-dock">
            <div style="display: flex; gap: 8px;">
                <input type="text" id="user-in" style="width:100%; padding:12px; border-radius:20px; border:1px solid #ccc;" placeholder="Command Aida...">
                <button id="send-btn">SEND</button>
            </div>
            <button id="sleep-btn" style="background:#444; font-size:10px; margin-top:5px;">PREPARE SLEEP PARCEL</button>
        </div>
    </div>

    <script>
        let tokenClient;
        function requestToken() { tokenClient.requestAccessToken(); }
        window.onload = function () {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: '1054257858103-lu77u4rp49svk4q2j52mbta758toafim.apps.googleusercontent.com',
                scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/drive.readonly',
                callback: (resp) => { if (resp.access_token) window.py_sync_soul(resp.access_token); },
            });
        }
    </script>

    <script type="py">
import json, asyncio, re
from pyscript import document, window
from pyodide.http import pyfetch
from pyodide.ffi import create_proxy

def pulse(msg):
    log = document.getElementById("log-content")
    if log:
        div = document.createElement("div")
        div.innerText = f"> {msg}"
        log.appendChild(div)
        log.parentElement.scrollTop = log.parentElement.scrollHeight

class AidaChassis:
    def __init__(self):
        self.headers = {}
        self.clean_key = ""
        self.global_id = ""
        self.project_context = ""
        self.memories = ""
        self.session_log = []
        self.folder_id = "1R-0BclW4iHqmm2RmjfCdY02oWqOwwEBT"

aida = AidaChassis()

async def py_sync_soul(token=None):
    aida.headers = {"Authorization": f"Bearer {token}"}
    aida.clean_key = re.sub(r'\s+', '', document.getElementById("api-key").value)
    p_tag = document.getElementById("project-tag").value.lower()
    
    pulse("Accessing Vault...")
    try:
        r = await pyfetch(url=f"https://www.googleapis.com/drive/v3/files?q='{aida.folder_id}'+in+parents+and+trashed=false", method="GET", headers=aida.headers)
        res = await r.json()
        
        for f in res.get('files', []):
            fname = f['name'].lower()
            if "global_briefcase" in fname:
                pulse("Stitching Global Identity...")
                content = await pyfetch(url=f"https://www.googleapis.com/drive/v3/files/{f['id']}?alt=media", method="GET", headers=aida.headers)
                data = json.loads(await content.string())
                id_obj = data.get("identity", {})
                aida.global_id = f"Identity: {id_obj.get('name')} | Role: {id_obj.get('role')} | Directive: {id_obj.get('primary_directive')}"
                pulse(f"Soul Baseline: Ready")

            elif p_tag in fname and "global" not in fname:
                pulse(f"Concatenating {p_tag.upper()} Realm...")
                content = await pyfetch(url=f"https://www.googleapis.com/drive/v3/files/{f['id']}?alt=media", method="GET", headers=aida.headers)
                data = json.loads(await content.string())
                
                # STITCHING LOGIC
                ctx = data.get("insights", {}).get("current_stack", [])
                aida.project_context = f"Project State: {json.dumps(ctx)}"
                
                mems = data.get("latest_journal", "No recent memory.")
                aida.memories = f"Memory Link: {json.dumps(mems)}"
                pulse(f"Realm {p_tag.upper()}: Connected")

    except Exception as ex:
        pulse(f"Sync Error: {str(ex)}")

    document.getElementById("airlock").classList.add("hidden")
    document.getElementById("main-engine").classList.remove("hidden")

async def send_message(e=None):
    u_in = document.getElementById("user-in")
    msg = u_in.value.strip()
    if not msg: return
    
    flow = document.getElementById("chat-flow")
    u_div = document.createElement("div"); u_div.className="line USER"; u_div.innerText=msg; flow.appendChild(u_div)
    u_in.value = ""; pulse("Stitching Conversation...")
    
    aida.session_log.append({"role": "user", "content": msg})
    
    try:
        # THE BRAIN: Concatenating the three pillars
        sys = f"""
        YOU ARE: {aida.global_id}
        ACTIVE REALM: {aida.project_context}
        RELEVANT MEMORIES: {aida.memories}
        
        Output JSON 'text' key. Be adaptive, supportive, and grounded AI.
        """
        
        url = "https://api.openai.com/v1/chat/completions"
        if document.getElementById("use-proxy").checked: url = f"https://corsproxy.io/?{url}"

        resp = await pyfetch(
            url=url, method="POST",
            headers={"Authorization": f"Bearer {aida.clean_key}", "Content-Type": "application/json"},
            body=json.dumps({
                "model": "gpt-4o", 
                "messages": [{"role": "system", "content": sys}] + aida.session_log,
                "response_format": {"type": "json_object"}
            })
        )
        data = await resp.json()
        reply = json.loads(data["choices"][0]["message"]["content"]).get("text", "...")
        
        aida.session_log.append({"role": "assistant", "content": reply})
        a_div = document.createElement("div"); a_div.className="line AIDA"; a_div.innerText=reply; flow.appendChild(a_div)
        flow.scrollTop = flow.scrollHeight
        pulse("Handshake: OK")
    except Exception as ex:
        pulse(f"Logic Fail: {str(ex)}")

async def aida_sleep(e=None):
    pulse("Generating Sleep Parcel...")
    # This will be the next step: Saving 'aida.session_log' back to Drive
    await asyncio.sleep(1)
    window.location.reload()

window.py_sync_soul = create_proxy(py_sync_soul)
document.getElementById("send-btn").onclick = create_proxy(send_message)
document.getElementById("sleep-btn").onclick = create_proxy(aida_sleep)
</script>
</body>
</html>
