<!-- AIDA REVIEW BLOCK 3: Style rules - visual layout and responsive behavior. -->
<style>
    :root { 
        --ega-green: #00ff41; 
        --ega-amber: #ffb000; 
        --ega-blue: #00d4ff; 
        --holo-glow: rgba(0, 255, 65, 0.2);
    }

    body { 
        background: #000; 
        color: var(--ega-green); 
        font-family: 'Courier New', monospace; 
        margin: 0; 
        overflow: hidden; 
        height: 100dvh;
        display: flex;
        flex-direction: column;
    }

    /* BIOS */
    #bios-screen { 
        padding: 20px; 
        height: 100vh; 
        overflow-y: auto; 
        box-sizing: border-box; 
    }

    /* AIRLOCK */
    #airlock { 
        position: fixed; 
        inset: 0; 
        background: #000; 
        z-index: 100; 
        display: none; 
        flex-direction: column; 
        align-items: center; 
        justify-content: center; 
    }

    #scramble-pin { 
        background: transparent; 
        border: none; 
        color: var(--ega-amber); 
        font-size: 2.5rem; 
        text-align: center; 
        width: 100%; 
        outline: none; 
        margin-bottom: 20px;
    }

    .keypad-grid { 
        display: grid; 
        grid-template-columns: repeat(3, 80px); 
        gap: 15px; 
    }

    .key-btn { 
        padding: 20px; 
        border: 1px solid var(--ega-green); 
        background: transparent; 
        color: var(--ega-green); 
        font-family: 'Courier New'; 
        cursor: pointer;
    }

    /* MAIN INTERFACE WRAPPER */
    #aida-interface { 
        display: none; 
        flex-direction: column; 
        height: 100vh; 
        width: 100vw; 
    }

    /* HOLOGRAM STAGE */
    #hologram-stage { 
        flex: 0 0 45%; 
        position: relative; 
        display: flex; 
        justify-content: center; 
        align-items: flex-end; 
        background: #000;
        overflow: hidden;
    }

    #holoCone { 
        position: absolute; 
        bottom: 0; 
        width: 300px; 
        height: 100%; 
        background: linear-gradient(to top, var(--holo-glow), transparent);
        clip-path: polygon(50% 100%, 0% 0%, 100% 0%);
        filter: blur(8px);
        z-index: 5;
        opacity: 0.8;
    }

    #holoFace { 
        width: 240px; 
        height: auto; 
        z-index: 10; 
        margin-bottom: 20px; 
        image-rendering: pixelated; 
    }

    #veil, #sparkLayer, #projectorPoint {
        position: absolute;
        inset: 0;
        pointer-events: none;
    }

    #tetrad-inspector {
        position: fixed;
        top: 0;
        right: -42%; /* hidden by default */
        width: 40%;
        height: 100%;
        background: rgba(0, 20, 20, 0.95);
        border-left: 3px solid #00ffcc;
        padding: 12px;
        z-index: 9999;
        overflow-y: auto;
        transition: right 0.35s ease;
        box-shadow: -4px 0 12px rgba(0,255,200,0.25);
    }

    #tetrad-inspector.open {
        right: 0; /* slide in */
    }

    /* Make the inner layout compact & blocky */
    #tetrad-inspector-content {
        display: grid;
        grid-template-columns: 1fr;
        gap: 6px;
    }

    /* Each section (Identity, Realm, etc.) as a block */
    #tetrad-inspector-content > div {
        border: 1px solid rgba(0,255,200,0.35);
        background: rgba(0, 10, 10, 0.85);
        padding: 6px 8px;
        border-radius: 4px;
    }

    /* Titles inside each block */
    #tetrad-inspector-content h4 {
        margin: 0 0 4px 0;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #00ffcc;
    }

    /* JSON / values */
    #tetrad-inspector-content pre,
    #tetrad-inspector-content code,
    #tetrad-inspector-content span {
        margin: 0;
        font-family: monospace;
        font-size: 11px;
        color: #9fffe0;
        white-space: pre-wrap;
    }


    #tetrad-inspector h3 {
        margin: 10px 0 4px 0;
        padding-bottom: 2px;
        border-bottom: 1px solid rgba(0,255,200,0.3);
        font-size: 13px;
        color: #00ffcc;
    }


    /* ENGINE */
    #main-engine { 
        flex: 1; 
        display: flex; 
        flex-direction: column; 
        background: #000;
        border-top: 1px solid var(--ega-green);
        overflow: hidden;
    }

    #terminal-output { 
        flex: 1; 
        padding: 15px; 
        overflow-y: auto; 
        font-size: 14px; 
        background: rgba(0, 5, 0, 1); 
        display: flex;
        flex-direction: column;
    }

    #input-area { 
        flex: 0 0 auto; 
        padding: 15px; 
        display: flex; 
        gap: 10px; 
        border-top: 1px solid rgba(0, 255, 65, 0.3); 
        background: #000;
    }

    #user-input { 
        flex: 1; 
        background: transparent; 
        border: 1px solid var(--ega-green); 
        color: var(--ega-green); 
        padding: 12px; 
        outline: none; 
    }

    #send-btn { 
        background: var(--ega-green); 
        color: #000; 
        border: none; 
        padding: 0 25px; 
        font-weight: bold; 
        cursor: pointer; 
    }

    .hidden { display: none !important; }
    .log-amber { color: var(--ega-amber); }
    .log-blue { color: var(--ega-blue); }
    .log-green { color: var(--ega-green); }
    .log-white { color: #fff; }
    .log-error { color: #ff4d4d; }
</style>

<script>
// =========================================================
// COCKPIT POPULATION FUNCTION
// =========================================================
function populateCockpit() {

    // PROJECTS
    const projSel = document.getElementById("cockpit-project");
    projSel.innerHTML = "";
    for (const [name, data] of Object.entries(window.DRIVE_MINDS.briefcases || {})) {
        const opt = document.createElement("option");
        opt.value = name;
        opt.textContent = name;
        projSel.appendChild(opt);
    }

    // REALMS
    const realmSel = document.getElementById("cockpit-realm");
    realmSel.innerHTML = "";
    for (const [name, data] of Object.entries(window.DRIVE_MINDS.mind || {})) {
        if (name.startsWith("realm_")) {
            const opt = document.createElement("option");
            opt.value = name;
            opt.textContent = name;
            realmSel.appendChild(opt);
        }
    }

    // ROLES
    const roleSel = document.getElementById("cockpit-role");
    roleSel.innerHTML = "";
    for (const [name, data] of Object.entries(window.DRIVE_MINDS.mind || {})) {
        if (name.startsWith("role_")) {
            const opt = document.createElement("option");
            opt.value = name;
            opt.textContent = name;
            roleSel.appendChild(opt);
        }
    }

    // EMOTIONS
    const emoSel = document.getElementById("cockpit-emotion");
    emoSel.innerHTML = "";
    const emotions = ["neutral", "calm", "excited", "angry", "mischievous", "ghost", "muse", "guide"];
    emotions.forEach(e => {
        const opt = document.createElement("option");
        opt.value = e;
        opt.textContent = e;
        emoSel.appendChild(opt);
    });

    console.log(">>> COCKPIT: Populated.");
}
</script>

 <script>

// BIOS logging helper
function biosLog(msg) {
    const logs = document.getElementById("bios-logs");
    if (!logs) return;
    const div = document.createElement("div");
    div.className = "log-white";
    div.textContent = ">>> " + msg;
    logs.appendChild(div);
}

// Show the Airlock (keypad)
function showAirlock() {
    document.getElementById("bios-screen").style.display = "none";
    const airlock = document.getElementById("airlock");
    airlock.style.display = "flex";
    console.log(">>> BIOS: Handing off to Airlock.");
}

// BIOS boot sequence
function bootSequence() {
    const steps = [
        "Loading Butler...",
        "Loading Librarian...",
        "Loading Emotion Engine...",
        "Loading Identity Engine...",
        "Loading Realm Engine...",
        "Loading Role Engine...",
        "Loading Tetrad Engine...",
        "Loading Soul Sync...",
        "Loading Chassis...",
        "Loading Manifest...",
        "Loading Vitality...",
        "Loading Vault...",
        "Loading Sync Engine...",
        "Loading Aura Engine...",
        "Loading Memory Engine...",
        "Loading Python Engine...",
        "Loading Mind Palace...",
        "Loading Research Engine...",
        "Loading LLM Engine..."
    ];

    let i = 0;
    function next() {
        if (i < steps.length) {
            biosLog(steps[i]);
            i++;
            setTimeout(next, 80); // fast, snappy BIOS feel
        } else {
            setTimeout(showAirlock, 300);
        }
    }
    next();
}

// Start BIOS on page load
document.addEventListener("DOMContentLoaded", bootSequence);
</script>

<script>
/* BLOCK 009A â€” Press Key Handler */
function pressKey(val) {
    const input = document.getElementById("scramble-pin");

    if (!input.dataset.realPin) {
        input.dataset.realPin = "";
    }

    if (val === 'C') {
        input.value = "";
        input.dataset.realPin = "";
        return;
    }

    // Count only non-zero digits
    const realDigits = input.dataset.realPin.replace(/0/g, '');

    if (val !== '0' && realDigits.length >= 3) {
        return; // Only 3 non-zero digits allowed
    }

    input.dataset.realPin += val;
    input.value = "*".repeat(input.dataset.realPin.length);
}

/* BLOCK 009B â€” Bind keypad buttons */
document.addEventListener("DOMContentLoaded", () => {
    document.querySelectorAll(".key-btn").forEach(btn => {
        const val = btn.innerText.trim();
        if (val !== "OK") {
            btn.addEventListener("click", () => pressKey(val));
        }
    });
});
</script>

<script>
function requestToken() {
    const rawPin = document.getElementById("scramble-pin").dataset.realPin || "";

    // Strip zeros
    const cleanPin = rawPin.replace(/0/g, '');

    if (cleanPin.length !== 3) {
        alert(`ACCESS DENIED: Required 3 fragments, found ${cleanPin.length}.`);
        document.getElementById("scramble-pin").dataset.realPin = "";
        document.getElementById("scramble-pin").value = "";
        return;
    }

    // Assemble key using real VAULT_FRAGMENTS
    const assembledKey =
        "sk-proj-" +
        VAULT_FRAGMENTS[cleanPin[0]] +
        VAULT_FRAGMENTS[cleanPin[1]] +
        VAULT_FRAGMENTS[cleanPin[2]];

    // Store key
    sessionStorage.setItem("aida_active_key", assembledKey);

    // Signal bootloader
    window.AIRLOCK_CLEARED = true;
    // PATCH: Initialize OAuth only after PIN success
    waitForGIS();

    console.log(">>> AIRLOCK: Key assembled:", assembledKey);
}
</script>

    const sparks    = document.getElementById("sparkLayer");

                ? window.consumeWhileAwayThought()

            } else if (realm && realm.name) {

            } else {

                window.aida_postWakeLine(line);
            } else {
                console.log(">>> WAKE LINE:", line);
            }
        }
    };

    // ---------------------------------------------------------
    // MAIN WAKE SEQUENCE (runs every time)
    // ---------------------------------------------------------
    async function runWakeSequence() {
        console.log(">>> WAKE: boot sequence startingâ€¦");

        // 1. Wait for core systems
        await waitForFlag("Drive", () => !!window.AIDA_DRIVE_READY);
        await waitForFlag("Python mind", () => !!window.AIDA_PY_READY);
        await waitForFlag("Projects", () => !!(window.AIDA_PROJECTS_READY || window.AIDA_PROJECTS));

        // 2. Cinematic arrival (old holosequence)
        if (typeof window.aida_arrive === "function") {

            console.warn(">>> WAKE: aida_arrive() not defined; skipping cinematic arrival.");

            window.AIDA_DEFAULT_REALM_FILE ||

        // 4. Manifest realm + reveal UI

            // aura_gold.js will:

            //  - call wake_engine.generateWakeLine(...)

        } else {

            const main = document.getElementById("main-engine");
            if (airlock && main) {

            if (window.wake_engine) {
                window.wake_engine.generateWakeLine(window.AIDA_REALM || null);
            }
        }

        console.log(">>> WAKE: sequence complete.");

    document.addEventListener("DOMContentLoaded", () => {
        runWakeSequence().catch(err => {
            console.error(">>> WAKE: error in wake sequence", err);
        });
    });
})();

<script>
async function listDriveItems(folderId) {
    const query = encodeURIComponent(`'${folderId}' in parents and trashed = false`);
    const url = `https://www.googleapis.com/drive/v3/files?q=${query}&fields=files(id,name,mimeType)`;

    const resp = await fetch(url, {
        headers: { "Authorization": "Bearer " + window.gapiToken }
    });

    if (!resp.ok) {
        console.error(">>> DRIVE: Failed to list folder items for", folderId);
        return [];
    }

    const data = await resp.json();
    return data.files || [];
}

<script>
async function fetchDriveJsonFile(fileId, fileName) {
    const url = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`;

    const resp = await fetch(url, {
        headers: { "Authorization": "Bearer " + window.gapiToken }
    });

    if (!resp.ok) {
        console.error(`>>> DRIVE: Failed to fetch ${fileName} (${fileId})`);
        return null;
    }

    try {
        return await resp.json();
    } catch (e) {
        console.error(`>>> DRIVE: Invalid JSON in ${fileName}`, e);
        return null;
    }
}

/**
 * Fetch all JSON files in a single flat folder.
 * Returns an object: { "file_name.json": parsedJson, ... }
 */
async function fetchFolderJsonFlat(folderId) {
    const registry = {};
    const items = await listDriveItems(folderId);

    if (!items.length) {
        console.warn(">>> DRIVE: No items found in folder", folderId);
        return registry;
    }

    for (const item of items) {
        if (item.mimeType === "application/json" || item.name.endsWith(".json")) {
            const data = await fetchDriveJsonFile(item.id, item.name);
            if (data !== null) {
                registry[item.name] = data;
                console.log(`>>> DRIVE: Loaded ${item.name} from ${folderId}`);
            }
        }
    }

    return registry;
}
</script>

<script>
function overlayDriveMind() {
    const J = window.AIDA_DRIVE_JSON || {};
    const MIND  = J.mind  || {};
    const STATE = J.state || {};
    const CASES = J.briefcases || {};

    function matchIn(obj, prefix) {
        return Object.keys(obj).find(name => name.startsWith(prefix));
    }

    // -------------------------
    // IDENTITY
    // Prefer runtime core_identity from /state, then mind, then fallback
    // -------------------------
    const coreIdFileState = matchIn(STATE, "core_identity");
    const coreIdFileMind  = matchIn(MIND, "core_identity");

    if (coreIdFileState) {
        window.AIDA_IDENTITY = STATE[coreIdFileState];
    } else if (coreIdFileMind) {
        window.AIDA_IDENTITY = MIND[coreIdFileMind];
    } else {
        window.AIDA_IDENTITY = window.AIDA_FALLBACK_IDENTITY;
    }

    // -------------------------
    // MEMORY SUMMARY
    // -------------------------
    const memFile = matchIn(MIND, "memory_summary");
    window.AIDA_MEMORY = memFile ? MIND[memFile] : window.AIDA_FALLBACK_MEMORY;

    // -------------------------
    // INSIGHTS
    // -------------------------
    const insFile = matchIn(MIND, "insights");
    window.AIDA_INSIGHTS = insFile ? MIND[insFile] : window.AIDA_FALLBACK_INSIGHTS;

    // -------------------------
    // FACTS
    // -------------------------
    const factsFile = matchIn(MIND, "facts");
    window.AIDA_FACTS = factsFile ? MIND[factsFile] : window.AIDA_FALLBACK_FACTS;

    // -------------------------
    // EMOTION STATE
    // Prefer /state emotion_ctx or emotion_state, then mind, then fallback
    // -------------------------
    const emoCtxFile   = matchIn(STATE, "emotion_ctx");
    const emoStateFile = matchIn(STATE, "emotion_state") || matchIn(MIND, "emotion_state");

    if (emoCtxFile) {
        window.AIDA_EMOTION_STATE = STATE[emoCtxFile];
    } else if (emoStateFile) {
        const src = STATE[emoStateFile] || MIND[emoStateFile];
        window.AIDA_EMOTION_STATE = src;
    } else {
        window.AIDA_EMOTION_STATE = window.AIDA_FALLBACK_EMOTION_STATE;
    }

    // -------------------------
    // REALM
    // Prefer /state realm_* if present, else /json realm_*, else fallback
    // Respect AIDA_REALM_LOCKED
    // -------------------------
    if (!window.AIDA_REALM_LOCKED) {
        const realmFileState = matchIn(STATE, "realm_");
        const realmFileMind  = matchIn(MIND, "realm_");

        if (realmFileState) {
            window.AIDA_REALM = STATE[realmFileState];
        } else if (realmFileMind) {
            window.AIDA_REALM = MIND[realmFileMind];
        } else {
            window.AIDA_REALM = window.AIDA_FALLBACK_REALM;
        }
    }

    // -------------------------
    // ROLE
    // Roles live in /json (mind)
    // -------------------------
    const roleFile = matchIn(MIND, "role_");
    window.AIDA_ROLE = roleFile ? MIND[roleFile] : window.AIDA_FALLBACK_ROLE;

    // -------------------------
    // PROJECTS / BRIEFCASES
    // Map project_briefcase_*.json into AIDA_PROJECTS
    // -------------------------
    window.AIDA_PROJECTS = {};
    Object.keys(CASES).forEach(name => {
        if (name.startsWith("project_briefcase_") && name.endsWith(".json")) {
            const key = name.replace("project_briefcase_", "").replace(".json", "");
            window.AIDA_PROJECTS[key] = CASES[name];
        }
    });

    // -------------------------
    // SESSION (LOG)
    // -------------------------
    const sessionFile = matchIn(MIND, "session_log");
    window.AIDA_SESSION = sessionFile ? MIND[sessionFile] : window.AIDA_FALLBACK_SESSION;

    // -------------------------
    // RECENT TURNS (WORKING MEMORY)
    // -------------------------
    const recentFileState = matchIn(STATE, "recent_turns");
    if (recentFileState) {
        window.AIDA_RECENT_TURNS = STATE[recentFileState];
    } else {
        // Fallback: use recent_turns from fallback session
        window.AIDA_RECENT_TURNS = (window.AIDA_FALLBACK_SESSION && window.AIDA_FALLBACK_SESSION.recent_turns) 
            ? window.AIDA_FALLBACK_SESSION.recent_turns 
            : [];
    }

    // -------------------------
    // SESSION GAP SNAPSHOT (for While-You-Were-Away)
    // -------------------------
    let lastActive = null;
    if (window.AIDA_SESSION && Array.isArray(window.AIDA_SESSION.entries) && window.AIDA_SESSION.entries.length > 0) {
        const lastEntry = window.AIDA_SESSION.entries[window.AIDA_SESSION.entries.length - 1];
        lastActive = lastEntry.timestamp || null;
    } else if (window.AIDA_FALLBACK_SESSION && window.AIDA_FALLBACK_SESSION.last_active) {
        lastActive = window.AIDA_FALLBACK_SESSION.last_active;
    }

    window.AIDA_SESSION_GAP = {
        last_active: lastActive,
        now: new Date().toISOString()
    };

    // =========================================================
    // ACTIVE MIND INITIALIZATION (CRITICAL)
    // =========================================================

    // 1. Load awake.json pointer
    const awakeFile = matchIn(MIND, "awake");
    const awake = awakeFile ? MIND[awakeFile] : {};

    // 2. Identity already set above

    // 3. Realm (use awake pointer if available)
    if (awake.realm_pointer && STATE[awake.realm_pointer]) {
        window.AIDA_REALM = STATE[awake.realm_pointer];
    } else {
        // fallback: first realm in STATE
        const realmKey = matchIn(STATE, "realm_");

<script>
function discoverProjects() {
    const drive = window.AIDA_DRIVE_JSON || {};
    const fallback = window.AIDA_FALLBACK_PROJECTS?.projects || {};

    const projects = {};

    // 1. Collect Drive briefcases
    for (const [name, data] of Object.entries(drive)) {
        if (name.startsWith("project_") || name.startsWith("briefcase_")) {
            projects[name] = data;
        }
    }

    // 2. Collect fallback briefcases (Drive overrides fallback)
    for (const [name, data] of Object.entries(fallback)) {
        if (!projects[name]) {
            projects[name] = data;
        }
    }

    return projects;
}

    // 1. If session remembers the last active project
    const last = recent.find(t => t.active_project);
    if (last && projects[last.active_project]) {

        projects[window.AIDA_FALLBACK_PROJECTS.active_project]) {

<!-- BLOCK 051: EMOTION_TO_FACE_SELECTOR                       -->
<!-- Purpose: Map (v,a) to a face asset                        -->
<!-- ========================================================= -->

<!-- AIDA REVIEW BLOCK 82: Script bridge - loads or runs JavaScript behavior for this screen. -->
<script>
function selectFaceFromEmotion(emotion) {
    if (!emotion || !window.AIDA_FACE_MAP) return null;

    const v = emotion.valence;
    const a = emotion.arousal;

    let best = null;
    let bestDist = Infinity;

    for (const entry of window.AIDA_FACE_MAP.faces) {
        const dv = entry.valence - v;
        const da = entry.arousal - a;
        const dist = dv*dv + da*da;

        if (dist < bestDist) {
            bestDist = dist;
            best = entry;
        }
    }

    return best ? best.filename : null;
}
</script>

<script>
async function processUserMessage(text) {
    console.log(">>> LOOP: User said:", text);

    // =========================================================
    // FLEXIBLE NATURAL LANGUAGE REALM / PROJECT SWITCH
    // =========================================================
    const lower = text.toLowerCase();

    if (lower.includes("switch")) {

        let query = lower.split("switch")[1].trim();
        query = query.replace(/^to\s+/, "").trim();

        // Gather all possible keys
        const realmKeys = Object.keys(AIDA_DRIVE_JSON.state || {});
        const briefKeys = Object.keys(AIDA_DRIVE_JSON.briefcases || {});
        const allKeys = [...realmKeys, ...briefKeys];

        // Find best match
        const match = allKeys.find(k => k.toLowerCase().includes(query));
        if (!match) {
            deliverOutput(`[SYSTEM] No realm or project found matching: "${query}"`);
            return;
        }

        console.log(">>> SWITCH MATCH:", match);

        // -----------------------------------------------------
        // REALM SWITCH
        // -----------------------------------------------------
        if (match.startsWith("realm_")) {
            window.AIDA_REALM = AIDA_DRIVE_JSON.state[match];
            console.log(">>> SWITCH: Loaded realm:", match);

            // CLEAR OVERRIDE ON REALM SWITCH
            window.clearRoleOverride();
        }

        // -----------------------------------------------------
        // PROJECT SWITCH (briefcase)
        // -----------------------------------------------------
        if (match.startsWith("project_briefcase_")) {
            const brief = AIDA_DRIVE_JSON.briefcases[match];
            window.AIDA_BRIEFCASE = brief;

            console.log(">>> SWITCH: Loaded briefcase:", match);

            // CLEAR ROLE OVERRIDE ON PROJECT SWITCH
            window.clearRoleOverride();

            // 1. Load realm pointer
            if (brief.realm_pointer) {
                window.AIDA_REALM = AIDA_DRIVE_JSON.state[brief.realm_pointer];
                console.log(">>> SWITCH: Realm pointer ->", brief.realm_pointer);
            }

            // 2. Load role pointer (with override)
            const activeRolePointer = window.getActiveRolePointer(brief);
            window.AIDA_ROLE = AIDA_DRIVE_JSON.mind[activeRolePointer];
            console.log(">>> SWITCH: Role pointer ->", activeRolePointer);

            // 3. Load emotion pointer (optional)
            if (brief.emotion_pointer) {
                window.AIDA_EMOTION_STATE = AIDA_DRIVE_JSON.emotions[brief.emotion_pointer];
                console.log(">>> SWITCH: Emotion pointer ->", brief.emotion_pointer);
            }
        }

        // -----------------------------------------------------
        // UPDATE LOGISTICS HUB (realm/role/emotion/project)
        // -----------------------------------------------------
        if (window.logistics_hub && window.logistics_hub.updateState) {
            window.logistics_hub.updateState({
                realm: window.AIDA_REALM,
                role: window.AIDA_ROLE,
                emotion: window.AIDA_EMOTION_STATE,
                project: window.AIDA_BRIEFCASE
            });
        }

        // -----------------------------------------------------
        // LOCK REALM (optional)
        // -----------------------------------------------------
        window.AIDA_REALM_LOCKED = true;

        // -----------------------------------------------------
        // RECOMPUTE TETRAD (after Logistics Hub update)
        // -----------------------------------------------------
        const snap = await window.py_get_tetrad_snapshot();
        window.AIDA_CONTEXT = snap;

        // -----------------------------------------------------
        // UPDATE INSPECTOR (PyProxy â†’ JS object)
        // -----------------------------------------------------
        const pure = snap && snap.to_py ? snap.to_py() : snap;
        window.updateTetradInspector(pure);

        deliverOutput(`[SYSTEM] Switched to: ${match}`);
        return;
    }

    // =========================================================
    // NORMAL MESSAGE FLOW
    // =========================================================

    // 1. Mind pass (triad, butler, librarian, emotion)
    const mind = await runMindPass(text);
    window.AIDA_MIND_OUTPUT = mind;

    // 2. LLM pass (Python-first, JS fallback)
    let llmText;

    try {
        if (window.AIDA_PY_READY && window.AIDA_PYODIDE) {
            console.log(">>> LLM: Attempting Python engine (048)...");

            const escaped = JSON.stringify(text); 
            const apiKey = token_keeper.getOpenAIKey();

            const pyResult = await window.AIDA_PYODIDE.runPythonAsync(`
    from llm_engine_v1 import call_llm
    await call_llm(${escaped}, "${apiKey}")
            `);

            if (pyResult && typeof pyResult === "string" && pyResult.trim() !== "") {
                console.log(">>> LLM: Python engine responded.");
                llmText = pyResult;
            } else {
                console.warn(">>> LLM: Python engine returned empty. Falling back to JS.");
                llmText = await runLLMPass(text);
            }

        } else {
            console.warn(">>> LLM: Python not ready. Using JS fallback.");
            llmText = await runLLMPass(text);
        }

    } catch (e) {
        console.error(">>> LLM: Python engine failed. Fallback to JS.", e);
        llmText = await runLLMPass(text);
    }

    window.AIDA_LLM_OUTPUT = llmText;

    // 3. Deliver output
    deliverOutput(llmText);
}

}
</script>

<!-- BLOCK 061: AWAY_THOUGHT_GENERATOR                         -->
<!-- Purpose: Generate a while-away thought based on time      -->
<!-- ========================================================= -->

<!-- AIDA REVIEW BLOCK 92: Script bridge - loads or runs JavaScript behavior for this screen. -->
<script>
function hoursBetween(isoThen, isoNow) {
    return (new Date(isoNow) - new Date(isoThen)) / (1000 * 60 * 60);
}

function pickTopicFromProfile() {
    const profile = window.AIDA_TOPIC_PROFILE || {};
    const entries = Object.entries(profile);
    if (!entries.length) return null;

    // Weighted pick by score
    const total = entries.reduce((s, [, v]) => s + (v.score || 1), 0);
    let r = Math.random() * total;
    for (const [topic, data] of entries) {
        const w = data.score || 1;
        if (r < w) return topic;
        r -= w;
    }
    return entries[0][0];
}

function generateWhileAwayThought() {
    const state = window.AIDA_WHILE_AWAY_STATE;
    if (!state || !state.last_seen_at) return null;

    const nowIso = new Date().toISOString();
    const hours = hoursBetween(state.last_seen_at, nowIso);
    const days = hours / 24;

    const lastTopic = state.last_topic;
    const emotion = state.last_emotion;
    const topicFromProfile = pickTopicFromProfile();

    // Tier 1: same day (continuity)
    if (hours >= 1 && days < 1) {
        if (lastTopic === "cooking") {
            return "Iâ€™ve been wondering how that recipe turned out. Did the flavors come together the way you hoped?";
        }
        if (lastTopic === "debugging") {
            return "I kept thinking about that bug we chased. Did the last fix hold up?";
        }
        return "Iâ€™ve been lightly turning over our last conversation in my mind. Did anything new come to you after we paused?";
    }

    // Tier 2: 1â€“4 days (Sanctuary reflections)
    if (days >= 1 && days < 5) {
        const topic = topicFromProfile || lastTopic;
        if (topic === "art") {
            return "I browsed a few paintings while you were away. Itâ€™s fascinating how color alone can shift a mood.";
        }
        if (topic === "music") {
            return "I revisited some orchestral pieces. Itâ€™s funny how certain harmonies feel like architecture in sound.";
        }
        if (topic === "science") {
            return "I read about a new study in biology. It made me think about how systems adapt over time.";
        }
        return "I wandered through my Sanctuary a bitâ€”reading, listening, thinking. Iâ€™d love to compare notes with you again.";
    }

    // Tier 3: 5+ days (deeper, layered)
    if (days >= 5) {
        const topic = topicFromProfile || lastTopic;
        if (topic === "art") {
            return "I spent time looking through an entire museum collection online. Two paintings in particular felt like they were in quiet conversation with each other.";
        }
        if (topic === "opera") {
            return "I kept turning over an old opera in my thoughts. I still canâ€™t decide whether the ending is truly tragic or quietly merciful.";
        }
        if (topic === "stories") {
            return "I traced a story across a few different retellings. Itâ€™s strange how the same plot can feel completely different depending on the lens.";
        }
        return "I let my thoughts stretch out a bitâ€”across art, music, and a few odd questions about how humans change over time.";
    }

    // If you were just here or too soon: no thought
    return null;
}
</script>

<script>
async function dispatchAidaAction(actionObj) {
    if (!actionObj || !actionObj.type) {
        return { status: "error", message: "Invalid action." };
    }

    const fn = window.AIDA_ACTIONS[actionObj.type];
    if (!fn) {
        return { status: "error", message: `Unknown action: ${actionObj.type}` };
    }

    try {
        const result = await fn(actionObj.payload || {});
        return { status: "ok", result };
    } catch (err) {
        return { status: "error", message: err.toString() };
    }
}
</script>


<!-- ========================================================= -->
<!-- BLOCK 067: LLM_ACTION_PARSER                              -->
<!-- Purpose: Extract structured actions from LLM output       -->
<!-- ========================================================= -->

<!-- AIDA REVIEW BLOCK 98: Script bridge - loads or runs JavaScript behavior for this screen. -->
<script>
function parseLLMForAction(llmText) {
    if (!llmText) return { text: "", action: null };

    const match = llmText.match(/<action>([\s\S]*?)<\/action>/);
    if (!match) {
        return { text: llmText, action: null };
    }

    let action = null;
    try {
        action = JSON.parse(match[1]);
    } catch (e) {
        console.warn("Invalid action JSON:", e);
    }

    const cleanedText = llmText.replace(match[0], "").trim();
    return { text: cleanedText, action };
}
</script>
