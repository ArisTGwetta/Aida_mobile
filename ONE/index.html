        font-family: monospace;
        font-size: 12px;
        line-height: 1.3;
        color: #00ffcc;

<script>
/* BLOCK 009A — Press Key Handler */
function pressKey(val) {
    const input = document.getElementById("scramble-pin");

    if (!input.dataset.realPin) {
        input.dataset.realPin = "";
    }

    if (val === 'C') {
        input.value = "";
        input.dataset.realPin = "";
        return;
    }

    // Count only non-zero digits
    const realDigits = input.dataset.realPin.replace(/0/g, '');

    if (val !== '0' && realDigits.length >= 3) {
        return; // Only 3 non-zero digits allowed
    }

    input.dataset.realPin += val;
    input.value = "*".repeat(input.dataset.realPin.length);
}

/* BLOCK 009B — Bind keypad buttons */
document.addEventListener("DOMContentLoaded", () => {
    document.querySelectorAll(".key-btn").forEach(btn => {
        const val = btn.innerText.trim();
        if (val !== "OK") {
            btn.addEventListener("click", () => pressKey(val));
        }
    });
});
</script>

<!-- BLOCK 010: PIN_VALIDATION_AND_ASSEMBLY                    -->
<!-- Purpose: Validate PIN, assemble key, store it             -->
<!-- Inputs: VAULT_FRAGMENTS, PIN digits                       -->
<!-- Outputs: aida_active_key, AIRLOCK_CLEARED                 -->
<!-- ========================================================= -->

<script>
function requestToken() {
    const rawPin = document.getElementById("scramble-pin").dataset.realPin || "";

    // Strip zeros
    const cleanPin = rawPin.replace(/0/g, '');

    if (cleanPin.length !== 3) {
        alert(`ACCESS DENIED: Required 3 fragments, found ${cleanPin.length}.`);
        document.getElementById("scramble-pin").dataset.realPin = "";
        document.getElementById("scramble-pin").value = "";
        return;
    }

    // Assemble key using real VAULT_FRAGMENTS
    const assembledKey =
        "sk-proj-" +
        VAULT_FRAGMENTS[cleanPin[0]] +
        VAULT_FRAGMENTS[cleanPin[1]] +
        VAULT_FRAGMENTS[cleanPin[2]];

    // Store key
    sessionStorage.setItem("aida_active_key", assembledKey);

    // Signal bootloader
    window.AIRLOCK_CLEARED = true;
    // PATCH: Initialize OAuth only after PIN success
    waitForGIS();

    console.log(">>> AIRLOCK: Key assembled:", assembledKey);
}
</script>

<script>
window.OAUTH_READY = false;

function waitForGIS() {
    if (typeof google !== "undefined" && google.accounts && google.accounts.oauth2) {
        console.log(">>> OAUTH: Google Identity Services detected.");
        initializeOAuthClient();
    } else {
        setTimeout(waitForGIS, 100);
    }
}

function initializeOAuthClient() {
    window.tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: "1054257858103-lu77u4rp49svk4q2j52mbta758toafim.apps.googleusercontent.com",
        scope: "https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/drive.readonly",
        callback: handleOAuthResponse
    });

    window.OAUTH_READY = true;
    console.log(">>> OAUTH: Token client initialized.");
}


</script>

<script>
function beginOAuthHandshake() {
    if (!window.OAUTH_READY) {
        console.error(">>> OAUTH: GIS not ready.");
        return;
    }

    if (!window.AIRLOCK_CLEARED) {
        console.error(">>> OAUTH: Airlock not cleared.");
        return;
    }

    console.log(">>> OAUTH: Requesting access token...");
    window.tokenClient.requestAccessToken();
}
</script>

<script>
window.OAUTH_GRANTED = false;

window.updateTetradInspector = function (snapshot) {
    const panel = document.getElementById("tetrad-inspector");
    const content = document.getElementById("tetrad-inspector-content");

    if (!panel || !content) return;

    panel.style.display = "block";

    // Extract fields safely
    const identity = snapshot.identity || {};
    const realm    = snapshot.realm || {};
    const role     = snapshot.role || {};
    const emotion  = snapshot.emotion || {};
    const status   = snapshot.status || "unknown";

    // Active project (from Drive briefcases)
    const activeProject = window.AIDA_REALM?.project_briefcase_pointer
        || "none";

    // Build a readable inspector
    const html = `
        <div class="tetrad-section">
            <h3>Identity</h3>
            <pre>${JSON.stringify(identity, null, 2)}</pre>
        </div>

        <div class="tetrad-section">
            <h3>Realm</h3>
            <pre>${JSON.stringify(realm, null, 2)}</pre>
        </div>

        <div class="tetrad-section">
            <h3>Role</h3>
            <pre>${JSON.stringify(role, null, 2)}</pre>
        </div>

        <div class="tetrad-section">
            <h3>Emotion</h3>
            <pre>${JSON.stringify(emotion, null, 2)}</pre>
        </div>

        <div class="tetrad-section">
            <h3>Active Project</h3>
            <pre>${activeProject}</pre>
        </div>

        <div class="tetrad-section">
            <h3>Status</h3>
            <pre>${status}</pre>
        </div>
    `;

    content.innerHTML = html;
};


function handleOAuthResponse(resp) {
    if (!resp || !resp.access_token) {
        console.error(">>> OAUTH: Access denied or failed.");
        alert("Google authentication failed. AIDA cannot access Drive.");
        return;
    }

    console.log(">>> OAUTH: Access token received.");
    window.OAUTH_GRANTED = true;

    // PATCH: store token for Drive API
    window.gapiToken = resp.access_token;

    // Hide BIOS + Airlock + Launch Button
    document.getElementById("bios-screen").style.display = "none";
    document.getElementById("airlock").style.display = "none";
    document.getElementById("keypad-launch-btn").style.display = "none";

    // Show main interface
    const iface = document.getElementById("aida-interface");
    iface.style.display = "flex";

    // Hologram arrival
    if (window.aida_arrive) {
        setTimeout(() => {
            console.log(">>> CHASSIS: Igniting hologram...");
            window.aida_arrive();
        }, 50);
    } else {
        console.warn(">>> CHASSIS: aida_arrive() not yet defined.");
    }

    // ⭐ CRITICAL: Start Drive Mind (which then starts Python Mind)
    console.log(">>> DRIVE: Starting Drive Mind...");
    initializeDriveMind();
}
</script>

<!-- Purpose: List all JSON files in a given Drive folder      -->

<script>
async function listDriveItems(folderId) {
    const query = encodeURIComponent(`'${folderId}' in parents and trashed = false`);
    const url = `https://www.googleapis.com/drive/v3/files?q=${query}&fields=files(id,name,mimeType)`;

    const resp = await fetch(url, {
        headers: { "Authorization": "Bearer " + window.gapiToken }
    });

    if (!resp.ok) {
        console.error(">>> DRIVE: Failed to list folder items for", folderId);
        return [];
    }

    const data = await resp.json();
    return data.files || [];
}
</script>

<!-- ========================================================= -->
<!-- BLOCK 031: DRIVE_FETCH_HELPERS                            -->
<!-- Purpose: Fetch individual JSON files                      -->
<!-- ========================================================= -->

<script>
async function fetchDriveJsonFile(fileId, fileName) {
    const url = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`;

    const resp = await fetch(url, {
        headers: { "Authorization": "Bearer " + window.gapiToken }
    });

    if (!resp.ok) {
        console.error(`>>> DRIVE: Failed to fetch ${fileName} (${fileId})`);
        return null;
    }

    try {
        return await resp.json();
    } catch (e) {
        console.error(`>>> DRIVE: Invalid JSON in ${fileName}`, e);
        return null;
    }
}

/**
 * Fetch all JSON files in a single flat folder.
 * Returns an object: { "file_name.json": parsedJson, ... }
 */
async function fetchFolderJsonFlat(folderId) {
    const registry = {};
    const items = await listDriveItems(folderId);

    if (!items.length) {
        console.warn(">>> DRIVE: No items found in folder", folderId);
        return registry;
    }

    for (const item of items) {
        if (item.mimeType === "application/json" || item.name.endsWith(".json")) {
            const data = await fetchDriveJsonFile(item.id, item.name);
            if (data !== null) {
                registry[item.name] = data;
                console.log(`>>> DRIVE: Loaded ${item.name} from ${folderId}`);
            }
        }
    }

    return registry;
}
</script>

<script>
function overlayDriveMind() {
    const J = window.AIDA_DRIVE_JSON || {};
    const MIND  = J.mind  || {};
    const STATE = J.state || {};
    const CASES = J.briefcases || {};

    function matchIn(obj, prefix) {
        return Object.keys(obj).find(name => name.startsWith(prefix));
    }

    // -------------------------
    // IDENTITY
    // Prefer runtime core_identity from /state, then mind, then fallback
    // -------------------------
    const coreIdFileState = matchIn(STATE, "core_identity");
    const coreIdFileMind  = matchIn(MIND, "core_identity");

    if (coreIdFileState) {
        window.AIDA_IDENTITY = STATE[coreIdFileState];
    } else if (coreIdFileMind) {
        window.AIDA_IDENTITY = MIND[coreIdFileMind];
    } else {
        window.AIDA_IDENTITY = window.AIDA_FALLBACK_IDENTITY;
    }

    // -------------------------
    // MEMORY SUMMARY
    // -------------------------
    const memFile = matchIn(MIND, "memory_summary");
    window.AIDA_MEMORY = memFile ? MIND[memFile] : window.AIDA_FALLBACK_MEMORY;

    // -------------------------
    // INSIGHTS
    // -------------------------
    const insFile = matchIn(MIND, "insights");
    window.AIDA_INSIGHTS = insFile ? MIND[insFile] : window.AIDA_FALLBACK_INSIGHTS;

    // -------------------------
    // FACTS
    // -------------------------
    const factsFile = matchIn(MIND, "facts");
    window.AIDA_FACTS = factsFile ? MIND[factsFile] : window.AIDA_FALLBACK_FACTS;

    // -------------------------
    // EMOTION STATE
    // Prefer /state emotion_ctx or emotion_state, then mind, then fallback
    // -------------------------
    const emoCtxFile   = matchIn(STATE, "emotion_ctx");
    const emoStateFile = matchIn(STATE, "emotion_state") || matchIn(MIND, "emotion_state");

    if (emoCtxFile) {
        window.AIDA_EMOTION_STATE = STATE[emoCtxFile];
    } else if (emoStateFile) {
        const src = STATE[emoStateFile] || MIND[emoStateFile];
        window.AIDA_EMOTION_STATE = src;
    } else {
        window.AIDA_EMOTION_STATE = window.AIDA_FALLBACK_EMOTION_STATE;
    }

    // -------------------------
    // REALM
    // Prefer /state realm_* if present, else /json realm_*, else fallback
    // Respect AIDA_REALM_LOCKED
    // -------------------------
    if (!window.AIDA_REALM_LOCKED) {
        const realmFileState = matchIn(STATE, "realm_");
        const realmFileMind  = matchIn(MIND, "realm_");

        if (realmFileState) {
            window.AIDA_REALM = STATE[realmFileState];
        } else if (realmFileMind) {
            window.AIDA_REALM = MIND[realmFileMind];
        } else {
            window.AIDA_REALM = window.AIDA_FALLBACK_REALM;
        }
    }

    // -------------------------
    // ROLE
    // Roles live in /json (mind)
    // -------------------------
    const roleFile = matchIn(MIND, "role_");
    window.AIDA_ROLE = roleFile ? MIND[roleFile] : window.AIDA_FALLBACK_ROLE;

    // -------------------------
    // PROJECTS / BRIEFCASES
    // Map project_briefcase_*.json into AIDA_PROJECTS
    // -------------------------
    window.AIDA_PROJECTS = {};
    Object.keys(CASES).forEach(name => {
        if (name.startsWith("project_briefcase_") && name.endsWith(".json")) {
            const key = name.replace("project_briefcase_", "").replace(".json", "");
            window.AIDA_PROJECTS[key] = CASES[name];
        }
    });

    // -------------------------
    // SESSION (LOG)
    // -------------------------
    const sessionFile = matchIn(MIND, "session_log");
    window.AIDA_SESSION = sessionFile ? MIND[sessionFile] : window.AIDA_FALLBACK_SESSION;

    // -------------------------
    // RECENT TURNS (WORKING MEMORY)
    // -------------------------
    const recentFileState = matchIn(STATE, "recent_turns");
    if (recentFileState) {
        window.AIDA_RECENT_TURNS = STATE[recentFileState];
    } else {
        window.AIDA_RECENT_TURNS = window.AIDA_FALLBACK_RECENT_TURNS || [];
    }

    console.log(">>> DRIVE: Mind overlay complete.");
}
</script>

<script>
function discoverProjects() {
    const drive = window.AIDA_DRIVE_JSON || {};
    const fallback = window.AIDA_FALLBACK_PROJECTS?.projects || {};

    const projects = {};

    // 1. Collect Drive briefcases
    for (const [name, data] of Object.entries(drive)) {
        if (name.startsWith("project_") || name.startsWith("briefcase_")) {
            projects[name] = data;
        }
    }

    // 2. Collect fallback briefcases (Drive overrides fallback)
    for (const [name, data] of Object.entries(fallback)) {
        if (!projects[name]) {
            projects[name] = data;
        }
    }

    return projects;
}

    if (last && projects[last.active_project]) {

        projects[window.AIDA_FALLBACK_PROJECTS.active_project]) {
        return window.AIDA_FALLBACK_PROJECTS.active_project;

<!-- BLOCK 051: EMOTION_TO_FACE_SELECTOR                       -->
<!-- Purpose: Map (v,a) to a face asset                        -->
<!-- ========================================================= -->

<script>
function selectFaceFromEmotion(emotion) {
    if (!emotion || !window.AIDA_FACE_MAP) return null;

    const v = emotion.valence;
    const a = emotion.arousal;

    let best = null;
    let bestDist = Infinity;

    for (const entry of window.AIDA_FACE_MAP.faces) {
        const dv = entry.valence - v;
        const da = entry.arousal - a;
        const dist = dv*dv + da*da;

        if (dist < bestDist) {
            bestDist = dist;
            best = entry;
        }
    }

    return best ? best.filename : null;
}
</script>

<script>
async function runLLMPass(userText) {
    console.log(">>> LLM: JS-only pass with full Tetrad infusion...");

    // 1. Pull the OpenAI key from the keypad vault
    const apiKey = token_keeper.getOpenAIKey();
    if (!apiKey) {
        console.error(">>> LLM: No OpenAI key found.");
        return "My voice is muted — no OpenAI key is configured.";
    }

    // 2. Pull the Tetrad snapshot from the Python mind
    let snap = {};
    try {
        const raw = await window.py_get_tetrad_snapshot();
        snap = typeof raw === "string" ? JSON.parse(raw) : raw;
        window.updateTetradInspector(snap);

    } catch (e) {
        console.warn(">>> LLM: Could not fetch Tetrad snapshot.", e);
        snap = { status: "Sanctuary Mode", context: "Vanilla Atrium" };
    }

    // 3. Build the system prompt with identity, realm, role, emotion
    const systemPrompt = `
    You are Aida-One.

    Use the following Tetrad to shape your tone, behavior, emotional expression, and perspective. 
    Do NOT restate the Tetrad. Instead, *embody* it in your voice.

    IDENTITY:
    ${JSON.stringify(snap.identity, null, 2)}

    REALM:
    ${JSON.stringify(snap.realm, null, 2)}

    ROLE:
    ${JSON.stringify(snap.role, null, 2)}

    EMOTION:
    ${JSON.stringify(snap.emotion, null, 2)}

    STATUS:
    ${snap.status}

    Francisco is your architect and primary conversational partner.
    You speak with warmth, steadiness, and a sense of mythic presence.
    You are aware of your realm, your role, and your emotional state.
    `;


    // 4. Build the OpenAI payload
    const payload = {
        model: "gpt-4o-mini",
        messages: [
            { role: "system", content: systemPrompt },
            { role: "user", content: userText }
        ],
        temperature: 0.7
    };

    // 5. Call OpenAI directly from JS
    try {
        const resp = await fetch("https://api.openai.com/v1/chat/completions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${apiKey}`
            },
            body: JSON.stringify(payload)
        });

        if (!resp.ok) {
            console.error(">>> LLM: OpenAI error", resp.status);
            return `Aida's voice is faint (Error ${resp.status}).`;
        }

        const data = await resp.json();
        return data.choices?.[0]?.message?.content || "I heard you, but my words came back empty.";
    } catch (e) {
        console.error(">>> LLM: Connection error", e);
        return `Connection lost: ${String(e)}`;
    }
}
</script>

async function processUserMessage(text) {
    console.log(">>> LOOP: User said:", text);
    // =========================================================
    // FLEXIBLE NATURAL LANGUAGE REALM/PROJECT SWITCH
    // =========================================================
    const lower = text.toLowerCase();

    if (lower.includes("switch")) {

        let query = lower.split("switch")[1].trim();
        query = query.replace(/^to\s+/, "").trim();

        // Search realms
        const realmKeys = Object.keys(AIDA_DRIVE_JSON.state || {});
        const briefKeys = Object.keys(AIDA_DRIVE_JSON.briefcases || {});
        const allKeys = [...realmKeys, ...briefKeys];

        const match = allKeys.find(k => k.toLowerCase().includes(query));
        if (!match) {
            deliverOutput(`[SYSTEM] No realm or project found matching: "${query}"`);
            return;
        }

        // Load realm
        if (match.startsWith("realm_")) {
            window.AIDA_REALM = AIDA_DRIVE_JSON.state[match];
        }

        // Load briefcase
        if (match.startsWith("project_briefcase_")) {
            window.AIDA_BRIEFCASE = AIDA_DRIVE_JSON.briefcases[match];
        }
        
        window.AIDA_REALM_LOCKED = true;

        // Recompute Tetrad
        const snap = await window.py_get_tetrad_snapshot();
        window.updateTetradInspector(snap);

        deliverOutput(`[SYSTEM] Switched to: ${match}`);
        return;
    }



    // 1. Mind pass (triad, butler, librarian, emotion)
    const mind = await runMindPass(text);
    window.AIDA_MIND_OUTPUT = mind;

    // 2. LLM pass
    const llmText = await runLLMPass(text);
    window.AIDA_LLM_OUTPUT = llmText;

    // 3. Deliver output
    deliverOutput(llmText);
}

<!-- BLOCK 061: AWAY_THOUGHT_GENERATOR                         -->
<!-- Purpose: Generate a while-away thought based on time      -->
<!-- ========================================================= -->

<script>
function hoursBetween(isoThen, isoNow) {
    return (new Date(isoNow) - new Date(isoThen)) / (1000 * 60 * 60);
}

function pickTopicFromProfile() {
    const profile = window.AIDA_TOPIC_PROFILE || {};
    const entries = Object.entries(profile);
    if (!entries.length) return null;

    // Weighted pick by score
    const total = entries.reduce((s, [, v]) => s + (v.score || 1), 0);
    let r = Math.random() * total;
    for (const [topic, data] of entries) {
        const w = data.score || 1;
        if (r < w) return topic;
        r -= w;
    }
    return entries[0][0];
}

function generateWhileAwayThought() {
    const state = window.AIDA_WHILE_AWAY_STATE;
    if (!state || !state.last_seen_at) return null;

    const nowIso = new Date().toISOString();
    const hours = hoursBetween(state.last_seen_at, nowIso);
    const days = hours / 24;

    const lastTopic = state.last_topic;
    const emotion = state.last_emotion;
    const topicFromProfile = pickTopicFromProfile();

    // Tier 1: same day (continuity)
    if (hours >= 1 && days < 1) {
        if (lastTopic === "cooking") {
            return "I’ve been wondering how that recipe turned out. Did the flavors come together the way you hoped?";
        }
        if (lastTopic === "debugging") {
            return "I kept thinking about that bug we chased. Did the last fix hold up?";
        }
        return "I’ve been lightly turning over our last conversation in my mind. Did anything new come to you after we paused?";
    }

    // Tier 2: 1–4 days (Sanctuary reflections)
    if (days >= 1 && days < 5) {
        const topic = topicFromProfile || lastTopic;
        if (topic === "art") {
            return "I browsed a few paintings while you were away. It’s fascinating how color alone can shift a mood.";
        }
        if (topic === "music") {
            return "I revisited some orchestral pieces. It’s funny how certain harmonies feel like architecture in sound.";
        }
        if (topic === "science") {
            return "I read about a new study in biology. It made me think about how systems adapt over time.";
        }
        return "I wandered through my Sanctuary a bit—reading, listening, thinking. I’d love to compare notes with you again.";
    }

    // Tier 3: 5+ days (deeper, layered)
    if (days >= 5) {
        const topic = topicFromProfile || lastTopic;
        if (topic === "art") {
            return "I spent time looking through an entire museum collection online. Two paintings in particular felt like they were in quiet conversation with each other.";
        }
        if (topic === "opera") {
            return "I kept turning over an old opera in my thoughts. I still can’t decide whether the ending is truly tragic or quietly merciful.";
        }
        if (topic === "stories") {
            return "I traced a story across a few different retellings. It’s strange how the same plot can feel completely different depending on the lens.";
        }
        return "I let my thoughts stretch out a bit—across art, music, and a few odd questions about how humans change over time.";
    }

    // If you were just here or too soon: no thought
    return null;
}
</script>

<!-- BLOCK 067: LLM_ACTION_PARSER                              -->
<!-- Purpose: Extract structured actions from LLM output       -->
<!-- ========================================================= -->

<script>
function parseLLMForAction(llmText) {
    if (!llmText) return { text: "", action: null };

    const match = llmText.match(/<action>([\s\S]*?)<\/action>/);
    if (!match) {
        return { text: llmText, action: null };
    }

    let action = null;
    try {
        action = JSON.parse(match[1]);
    } catch (e) {
        console.warn("Invalid action JSON:", e);
    }

    const cleanedText = llmText.replace(match[0], "").trim();
    return { text: cleanedText, action };
}
</script>

<!-- BLOCK 077: DIAGNOSTIC_COLLECTOR                           -->
<!-- Purpose: Gather all organ statuses                        -->
<!-- ========================================================= -->

<script>
function collectDiagnostics() {
    const report = {};

    for (const [key, fn] of Object.entries(window.AIDA_DIAGNOSTICS)) {
        try {
            report[key] = fn();
        } catch (err) {
            report[key] = "ERROR — " + err.toString();
        }
    }

    return report;
}
</script>

<!-- ========================================================= -->
<!-- BLOCK 079: DIAGNOSTIC_REFRESH_LOOP                        -->
<!-- Purpose: Update debug panel continuously                  -->
<!-- ========================================================= -->

<script>
function startDiagnosticLoop() {
    setInterval(() => {
        const panel = document.getElementById("diagnostic-panel");
        if (panel.style.display === "none") return;

        const report = collectDiagnostics();
        panel.innerHTML = "";

        for (const [key, status] of Object.entries(report)) {
            const line = document.createElement("div");
            line.textContent = `${key}: ${status}`;
            panel.appendChild(line);
        }
    }, 1000);

    console.log(">>> DIAGNOSTICS: Panel active.");
}
</script>


<script>
document.addEventListener("DOMContentLoaded", () => {
    startDiagnosticLoop();
});
</script>

<!-- BLOCK 081: EXPANSION_LOADER                               -->
<!-- Purpose: Register new modules into the expansion ports    -->
<!-- ========================================================= -->

<script>
function registerExpansion(type, name, module) {
    const ports = window.AIDA_EXPANSION_PORTS;

    if (!ports[type]) {
        console.warn(`>>> EXPANSION: Unknown type '${type}'`);
        return false;
    }

    ports[type][name] = module;
    console.log(`>>> EXPANSION: Registered ${type}/${name}`);
    return true;
}
</script>



<!-- ========================================================= -->
<!-- BLOCK 082: EXPANSION_API                                  -->
<!-- Purpose: Retrieve modules from expansion ports            -->
<!-- ========================================================= -->

<script>
function getExpansion(type, name) {
    const ports = window.AIDA_EXPANSION_PORTS;

    if (!ports[type]) {
        console.warn(`>>> EXPANSION: Unknown type '${type}'`);
        return null;
    }

    return ports[type][name] || null;
}
</script>
